<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Trends</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #090d18;
            color: #f9fafb;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 52px;
            background: #0b0f1c;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 0;
            gap: 6px;
            flex-shrink: 0;
        }

        .sidebar-logo {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px;
        }

        .sidebar-logo svg { width: 18px; height: 18px; fill: #fff; }

        .sidebar-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #4b5563;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .sidebar-icon:hover { background: rgba(255,255,255,0.06); color: #9ca3af; }
        .sidebar-icon.active { background: rgba(59,130,246,0.15); color: #3b82f6; }

        .sidebar-icon svg { width: 18px; height: 18px; }

        /* ── MAIN ── */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ── TOPBAR ── */
        .topbar {
            height: 44px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 6px;
            font-size: 0.78rem;
            color: #4b5563;
            flex-shrink: 0;
        }

        .topbar-sep { color: #2d3748; }

        .topbar-current { color: #6b7280; }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.67rem;
            font-weight: 700;
            color: #ef4444;
            letter-spacing: 0.06em;
            margin-left: auto;
        }

        .live-dot {
            width: 6px; height: 6px;
            background: #ef4444;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ── CONTENT ── */
        .content {
            padding: 28px 32px 24px;
            flex: 1;
        }

        /* ── PIE CHART ── */
        .pie-container {
            flex: 3;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-width: 0;
            padding: 10px;
        }
        #pieCanvas {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
        }
        #barCanvas {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
        }
        #pieTooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(15, 22, 35, 0.92);
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 0.75rem;
            color: #d1d5db;
            white-space: nowrap;
            display: none;
            z-index: 100;
        }

        /* ── PAGE TITLE ── */
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: #f9fafb;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 18px;
        }

        /* ── FILTER CHIPS ── */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-chip {
            position: relative;
            display: inline-flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 5px 14px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            color: #9ca3af;
            transition: all 0.2s;
            user-select: none;
            white-space: nowrap;
        }
        .filter-chip:hover {
            border-color: rgba(59, 130, 246, 0.4);
            color: #d1d5db;
        }
        .filter-chip.has-value {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
            font-weight: 600;
        }
        .filter-chip.open {
            border-color: #3b82f6;
            color: #e0e7ff;
            background: rgba(59, 130, 246, 0.15);
        }
        .filter-chip-label { font-weight: 600; }
        .filter-chip-sep {
            margin: 0 6px;
            color: rgba(255,255,255,0.2);
            font-weight: 300;
        }
        .filter-chip-arrow {
            margin-right: 6px;
            color: inherit;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .filter-chip.open .filter-chip-arrow { transform: rotate(180deg); }
        .filter-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #0f1623;
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 10px;
            padding: 4px 0;
            min-width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 200;
            direction: rtl;
        }
        .filter-chip.open .filter-dropdown { display: block; }
        .filter-option {
            padding: 7px 16px;
            font-size: 0.8rem;
            color: #9ca3af;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            text-align: right;
        }
        .filter-option:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #d1d5db;
        }
        .filter-option.active {
            color: #3b82f6;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.08);
        }
        .filter-reset {
            display: none;
            align-items: center;
            background: rgba(100, 116, 139, 0.25);
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.75rem;
            font-family: inherit;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-reset:hover {
            background: rgba(100, 116, 139, 0.45);
            color: #fff;
        }
        .filter-reset.visible { display: inline-flex; }
        .filter-sample-size {
            font-size: 0.72rem;
            color: #64748b;
            padding: 5px 8px;
            align-self: center;
            white-space: nowrap;
        }
        .filter-extra {
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
        }
        .filter-extra.expanded { display: flex; }
        .filter-more-btn {
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.8rem;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .filter-more-btn:hover { border-color: rgba(59,130,246,0.4); color: #93c5fd; }
        .filter-more-btn.has-hidden-active { color: #3b82f6; border-color: rgba(59,130,246,0.4); }

        /* ── CHART WRAPPER ── */
        .chart-wrapper {
            display: flex;
            gap: 0;
        }
        #miniPiesCanvas {
            width: 100%;
            margin-top: 8px;
        }

        .legend {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 50px 20px 20px 0;
        }

        .legend-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 0.9rem;
            color: #9ca3af;
            white-space: normal;
            line-height: 1.35;
            position: relative;
            cursor: default;
        }

        .legend-item .legend-color {
            margin-top: 0;
            flex-shrink: 0;
        }

        .legend-item .tooltip {
            display: none;
            position: absolute;
            left: calc(100% + 12px);
            top: 50%;
            transform: translateY(-50%);
            background: #0f1623;
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.73rem;
            color: #d1d5db;
            white-space: normal;
            width: 220px;
            line-height: 1.45;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 10;
            pointer-events: none;
        }

        .legend-item .tooltip::before {
            content: '';
            position: absolute;
            right: 100%;
            top: 50%;
            transform: translateY(-50%);
            border: 6px solid transparent;
            border-right-color: #0f1623;
        }

        .legend-item:hover .tooltip { display: block; }

        .legend-item.clickable { cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        .legend-item.top-level { font-size: 1rem; }
        .legend-item.top-level .legend-pct { font-size: 0.85rem !important; }
        .legend-item.top-level .legend-delta { font-size: 0.78rem !important; }
        .legend-item.clickable:hover span { color: #f9fafb; }

        .legend-item.clickable::after {
            content: '›';
            margin-left: 6px;
            color: #4b5563;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .legend-item.clickable:hover::after { color: #3b82f6; }


        .legend-color {
            width: 22px; height: 22px;
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
        }

        .legend-delta {
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 4px;
        }

        .charts-area {
            display: flex;
            gap: 0;
            flex: 1;
            min-width: 0;
            align-self: flex-start;
            flex-wrap: wrap;
            background: #0f1623;
            border: 1px solid rgba(59, 130, 246, 0.12);
            border-radius: 14px;
        }
        .chart-container {
            padding: 20px 24px;
            position: relative;
            flex: 7;
            min-width: 0;
        }

        .breadcrumb-nav {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .breadcrumb-nav .bc-step {
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.15s;
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
            font-size: inherit;
        }

        .breadcrumb-nav .bc-step:hover { color: #f1f5f9; }

        .breadcrumb-nav .bc-sep { color: #3b82f6; }

        .breadcrumb-nav .bc-current { color: #e2e8f0; }

        .breadcrumb-nav.bc-small { font-size: 0.85rem; gap: 3px; margin-bottom: 8px; }

        canvas#mainChart {
            width: 100% !important;
            min-height: 200px;
            cursor: crosshair;
        }

        .hint {
            text-align: center;
            color: #2d3748;
            font-size: 0.7rem;
            margin-top: 14px;
        }

        .time-range-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            padding: 0 4px;
        }

        .range-edge-label {
            color: #4b5563;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            flex-shrink: 0;
            min-width: 22px;
            text-align: center;
        }

        .time-slider {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #3b82f6 60%, #1e293b 60%);
            outline: none;
            cursor: pointer;
        }

        .time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3b82f6;
            border: 2px solid #1e293b;
            box-shadow: 0 0 8px rgba(59,130,246,0.5);
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        .time-slider::-webkit-slider-thumb:hover {
            box-shadow: 0 0 14px rgba(59,130,246,0.7);
        }

        .time-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3b82f6;
            border: 2px solid #1e293b;
            box-shadow: 0 0 8px rgba(59,130,246,0.5);
            cursor: pointer;
        }

        .time-slider::-moz-range-track {
            height: 6px;
            border-radius: 3px;
            background: transparent;
        }

        .range-value-label {
            color: #6b7280;
            font-size: 0.72rem;
            font-weight: 600;
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }
        /* ── LEFT COLUMN ── */
        .left-col {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            width: 300px;
            min-width: 300px;
            max-width: 480px;
        }

        .resize-handle {
            width: 6px;
            flex-shrink: 0;
            cursor: col-resize;
            background: transparent;
            transition: background 0.15s;
            border-radius: 3px;
            margin: 8px 2px;
        }
        .resize-handle:hover, .resize-handle.dragging {
            background: rgba(59,130,246,0.35);
        }

        /* ── INSIGHT PANEL ── */
        #insight-panel {
            display: none;
            flex-direction: column;
            padding: 20px 20px 20px 0;
            font-size: 0.9rem;
            color: #9ca3af;
            border-top: 1px solid rgba(255,255,255,0.06);
            gap: 10px;
        }
        .insight-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: none;
            letter-spacing: 0.02em;
            color: #9ca3af;
        }
        .insight-section { margin-bottom: 2px; }
        .insight-section-header {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 5px 0;
            font-size: 0.78rem;
            color: #4b5563;
            user-select: none;
            transition: color 0.15s;
        }
        .insight-section-header:hover { color: #9ca3af; }
        .insight-section-header .chevron {
            font-size: 0.6rem;
            transition: transform 0.2s;
        }
        .insight-section-header.open { color: #9ca3af; }
        .insight-section-header.open .chevron { transform: rotate(90deg); }
        .insight-section-body {
            display: none;
            flex-direction: column;
            gap: 7px;
            padding: 4px 0 8px;
        }
        .insight-section-body.open { display: flex; }
        .desire-view-title {
            font-size: 0.8rem;
            color: #f9fafb;
            padding: 8px 0 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .desire-clickable { cursor: pointer; }
        .desire-clickable:hover { color: #f9fafb; }
        #insight-panel ol {
            margin: 0;
            padding-left: 14px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        #insight-panel li {
            line-height: 1.35;
            color: #9ca3af;
            white-space: normal;
        }
    </style>
</head>

// Each value is a Set of selected option indices (empty or containing 0 = "All")
const activeFilters = { age: new Set(), gender: new Set(), origin: new Set(), religious: new Set(), income: new Set(), education: new Set(), region: new Set(), family: new Set(), political: new Set() };

function isFilterActive(key) { return activeFilters[key].size > 0; }

function getFilterDisplay(filter) {
    const sel = activeFilters[filter.key];
    if (sel.size === 0) return 'All';
    return [...sel].sort((a,b) => a-b).map(i => filter.options[i]).join('+');
}

function computeFilteredSeeds() {
    const seeds = [...BASE_SEEDS];
    for (const filter of FILTERS) {
        const sel = activeFilters[filter.key];
        if (sel.size === 0) continue;
        const indices = [...sel];
        // Average the deltas of all selected options
        const avg = [0,0,0,0,0];
        for (const idx of indices) {
            const d = filter.deltas[filter.options[idx]];
            for (let i = 0; i < 5; i++) avg[i] += d[i];
        }
        for (let i = 0; i < 5; i++) seeds[i] += Math.round(avg[i] / indices.length);
    }
    const clamped = seeds.map(s => Math.max(1, s));
    const total = clamped.reduce((a, b) => a + b, 0);
    return clamped.map(s => Math.round(s * 100 / total));
}

function getFilterLabel() {
    const active = FILTERS
        .filter(f => isFilterActive(f.key))
        .map(f => getFilterDisplay(f));
    return active.length === 0 ? null : active.join(', ');
}

// ── Sample Size ──
const ISRAEL_POP = 9900000;
const TIKTOK_RATE_DEFAULT = 0.73;
const TIKTOK_RATE_BY_AGE = {
    '0-16': 0.85, '17-22': 0.89, '23-30': 0.82, '31-45': 0.70, '46+': 0.45,
};

function computeSampleSize() {
    let pop = ISRAEL_POP;
    for (const f of FILTERS) {
        const sel = activeFilters[f.key];
        if (sel.size === 0) continue;
        pop = Math.round(pop * (sel.size / (f.options.length - 1)));
    }
    const ageSel = activeFilters.age;
    let rate = TIKTOK_RATE_DEFAULT;
    if (ageSel.size > 0) {
        const ageFilter = FILTERS.find(f => f.key === 'age');
        const rates = [...ageSel].map(i => TIKTOK_RATE_BY_AGE[ageFilter.options[i]] || 0.73);
        rate = rates.reduce((a, b) => a + b, 0) / rates.length;
    }
    return { population: pop, users: Math.round(pop * rate) };
}

function formatPop(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 1000) return Math.round(n / 1000) + 'K';
    return String(n);
}

// ── Continuous time-range slider helpers ──
function sliderToDays(val) {
    // Logarithmic mapping: 0→1 day, 1000→1825 days (5y)
    return Math.max(1, Math.round(Math.exp(Math.log(1825) * val / 1000)));
}
function daysToSlider(days) {
    return Math.round(Math.log(Math.max(1, days)) / Math.log(1825) * 1000);
}
function computeRangeParams(days) {
    return {
        days,
        points: 12,
        jitter: Math.max(0.05, Math.pow(days / 90, 0.5))
    };
}
function rangeLabel(days) {
    if (days <= 1)   return 'Last 24 hours';
    if (days <= 6)   return 'Last ' + days + ' days';
    if (days <= 13)  return 'Last week';
    if (days <= 20)  return 'Last 2 weeks';
    if (days <= 45)  return 'Last month';
    if (days <= 75)  return 'Last 2 months';
    if (days <= 105) return 'Last 3 months';
    if (days <= 150) return 'Last ' + Math.round(days / 30) + ' months';
    if (days <= 320) return 'Last ' + Math.round(days / 30) + ' months';
    if (days <= 540) return 'Last year';
    if (days <= 900) return 'Last 2 years';
    return 'Last ' + Math.round(days / 365) + ' years';
}

// ==================== DATA GENERATION ====================
function smoothStep(t) { return t * t * (3 - 2 * t); }

function buildStream(keyPoints) {
    const result = [];
    for (let i = 0; i < TOTAL_POINTS; i++) {
        const t = i / (TOTAL_POINTS - 1);
        let s = 0;
        while (s < keyPoints.length - 2 && keyPoints[s + 1].t <= t) s++;
        const a = keyPoints[s], b = keyPoints[s + 1];
        const lt = (t - a.t) / (b.t - a.t);
        result.push(a.v + (b.v - a.v) * smoothStep(lt));
    }
    return result;
}

function daysAgoToIndex(daysAgo) {
    const range = curRange;
    if (daysAgo > range.days) return -1;
    return Math.round(TODAY_IDX * (range.days - daysAgo) / range.days);
}

function getLionRoarDeltas(active) {
    if (desireViewMode) return active.map(() => 0);
    const dp = drilldownPath;
    // Top level
    if (dp.length === 0) {
        const map = { 'Current Affairs': 9, 'Entertainment & Music': -4,
                      'Lifestyle & Food': -3, 'Education & Knowledge': -1, 'Leisure & Sports': -1 };
        return active.map(s => map[s.name] ?? 0);
    }
    // Current Affairs sub-domains (bases: 30+22+15+20+13 = 100)
    if (dp.length === 1 && dp[0] === 2) {
        const map = { 'Security': 9, 'Politics': 1, 'Society': -2,
                      'Cost of Living': -5, 'Crime': -3 };
        return active.map(s => map[s.name] ?? 0);
    }
    // Security sub-topics (bases: 13+25+20+15+10+10+7 = 100)
    if (dp.length === 2 && dp[0] === 2 && dp[1] === 0) {

    return active.map(() => 0);
}

function applyLionRoarSpike(active) {
    const opStart = daysAgoToIndex(OP_DAYS_AGO);
    const deltas = getLionRoarDeltas(active);
    active.forEach((s, si) => {
        const delta = deltas[si];
        if (delta === 0) return;
        if (opStart < 0) {
            // Operation happened before range start – apply as flat offset
            for (let i = 0; i < dataStreams[si].length; i++) {
                dataStreams[si][i] = Math.max(0.3, dataStreams[si][i] + delta);
            }
        } else {
            for (let i = opStart; i < dataStreams[si].length; i++) {
                const ramp  = Math.min(1, (i - opStart) + 1);
                const noise = 1 + (Math.random() - 0.5) * 0.08;
                dataStreams[si][i] = Math.max(1, dataStreams[si][i] + delta * ramp * noise);
            }
        }
    });
}
