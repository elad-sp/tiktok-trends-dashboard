// ==================== LEGEND ====================
function updateLegendValues(values, total) {
    const items = document.querySelectorAll('#legend .legend-item');
    items.forEach((item, i) => {
        const small = item.querySelector('small.legend-pct');
        if (small && i < values.length) {
            small.textContent = desireViewMode
                ? Math.round(values[i] * DESIRE_EXPOSURE_SCALE) + 'K'
                : Math.round((values[i] / total) * 100) + '%';
            small.style.color = '#d1d5db';
        }
    });
}

function resetLegendValues() {
    const active = getActiveSeries();
    const leaf = isLeafLevel();
    if (leaf) return;
    const seeds = active.map(s => s.base);
    const items = document.querySelectorAll('#legend .legend-item');
    items.forEach((item, i) => {
        const small = item.querySelector('small.legend-pct');
        if (small && i < seeds.length) {
            small.textContent = seeds[i] + '%';
            small.style.color = '#6b7280';
        }
    });
}

function buildLegend() {
    const el = document.getElementById('legend');

    // Narrative view mode
    if (narrativeViewMode && activeNarrativeIdx !== null) {
        const active = getActiveSeries();
        const s = active[activeNarrativeIdx];
        let html = '<div class="breadcrumb-nav">';
        html += `<button class="bc-step" onclick="exitNarrativeView()">‹ Back</button>`;
        // Rebuild path breadcrumb
        let nav = SERIES;
        const pathParts = [];
        for (const idx of drilldownPath) {
            pathParts.push(nav[idx].name);
            nav = nav[idx].children;
        }
        pathParts.forEach((name, depth) => {
            html += '<span class="bc-sep">›</span>';
            html += `<button class="bc-step" onclick="exitNarrativeView(); drillTo(${depth + 1})">${name}</button>`;
        });
        html += `<span class="bc-sep">›</span><span class="bc-current">${s.name}</span>`;
        html += '</div>';
        el.innerHTML = html;
        buildInsightPanel();
        document.getElementById('pageTitle').textContent = 'TikTok Trends: ' + s.name;
        return;
    }

    // Desire view mode
    if (desireViewMode && activeDesire) {
        const narrs = activeDesire.narratives;
        const splitIdx = Math.max(0, narrs.length - 2);
        const rising = narrs.slice(0, splitIdx);
        const declining = narrs.slice(splitIdx);
        // Full breadcrumb: TikTok Trends › path... › narrative › Desire: label
        let html = '<div class="breadcrumb-nav bc-small">';
        html += `<button class="bc-step" onclick="exitDesireView()">‹ Back</button>`;
        let bcNav = SERIES;
        const bcParts = [];
        for (const idx of desireViewOwnerPath) {
            bcParts.push(bcNav[idx].name);
            bcNav = bcNav[idx].children;
        }
        // Narrative name from saved state
        const narrName = desirePrevNarrMode && desirePrevNarrIdx != null && bcNav[desirePrevNarrIdx]
            ? bcNav[desirePrevNarrIdx].name : '';
        html += '<span class="bc-sep">›</span>';
        html += `<button class="bc-step" onclick="exitDesireView(); exitNarrativeView(); drillTo(0)">TikTok Trends</button>`;
        bcParts.forEach((name, depth) => {
            html += '<span class="bc-sep">›</span>';
            html += `<button class="bc-step" onclick="exitDesireView(); exitNarrativeView(); drillTo(${depth + 1})">${name}</button>`;
        });
        if (narrName) {
            html += '<span class="bc-sep">›</span>';
            html += `<button class="bc-step" onclick="exitDesireView()">${narrName}</button>`;
        }
        const cleanLabel = activeDesire.label.replace(/^[\p{Emoji}\p{Emoji_Component}\u200D\uFE0F\u200B]+\s*/u, '');
        const offlineSuffix = offlineMode ? ' screen offline' : '';
        html += `<span class="bc-sep">›</span><span class="bc-current">Desire: ${cleanLabel}${offlineSuffix}</span>`;
        html += '</div>';
        // Influencing narratives with values and deltas
        html += '<div style="margin:14px 0 6px;font-size:0.68rem;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Influencing Narratives</div>';
        const displayNarrs = [...rising.map(n => ({ ...n, dir: 'up' })), ...declining.map(n => ({ ...n, dir: 'down' }))];
        displayNarrs.forEach((n, i) => {
            const stream = dataStreams[i];
            const curRaw = stream ? stream[Math.min(TODAY_IDX, stream.length - 1)] : n.base;
            const startRaw = stream ? stream[0] : n.base;
            const curK = Math.round(curRaw * DESIRE_EXPOSURE_SCALE);
            const startK = Math.round(startRaw * DESIRE_EXPOSURE_SCALE);
            const pctChange = startK > 0 ? Math.round((curK - startK) / startK * 100) : 0;
            const deltaColor = pctChange > 0 ? '#22c55e' : pctChange < 0 ? '#ef4444' : '#6b7280';
            const deltaArrow = pctChange > 0 ? '↑' : pctChange < 0 ? '↓' : '';
            const deltaSign = pctChange > 0 ? '+' : '';
            const boxColor = dataColors[i] || SERIES_COLORS[i % SERIES_COLORS.length];
            html += `<div class="legend-item">
                <div class="legend-color" style="background:${boxColor}"></div>
                <span>${n.name} <small class="legend-pct" style="color:#6b7280;font-size:0.7rem">${curK}K</small> <small class="legend-delta" style="color:${deltaColor}">${deltaArrow}${deltaSign}${pctChange}%</small></span>
            </div>`;
        });
        el.innerHTML = html;
        document.getElementById('insight-panel').style.display = 'none';
        document.getElementById('pageTitle').textContent = 'Influenced Desire: ' + activeDesire.label.replace(/^[\p{Emoji}\p{Emoji_Component}\u200D\uFE0F\u200B]+\s*/u, '');
        return;
    }

    const active = getActiveSeries();
    const leaf = isLeafLevel();
    const seeds = active.map(s => s.base);

    let html = '';

    // Clickable breadcrumb showing full path
    if (drilldownPath.length > 0) {
        let nav = SERIES;
        const pathParts = [];
        for (const idx of drilldownPath) {
            pathParts.push(nav[idx].name);
            nav = nav[idx].children;
        }
        html += '<div class="breadcrumb-nav">';
        html += `<button class="bc-step" onclick="drillTo(0)">TikTok Trends</button>`;
        pathParts.forEach((name, depth) => {
            html += '<span class="bc-sep">›</span>';
            if (depth < pathParts.length - 1) {
                html += `<button class="bc-step" onclick="drillTo(${depth + 1})">${name}</button>`;
            } else {
                html += `<span class="bc-current">${name}</span>`;
            }
        });
        html += '</div>';
    }

    html += active.map((s, i) => {
        const clickable = !!s.children;
        const leafClickable = !s.children && !!s.insights;
        const pct = leaf ? '' : `<small class="legend-pct" style="color:#6b7280;font-size:0.7rem">${seeds[i]}%</small>`;
        const d = seriesDeltas[i] || 0;
        const deltaColor = d > 0 ? '#22c55e' : d < 0 ? '#ef4444' : '#6b7280';
        const deltaArrow = d > 0 ? '↑' : d < 0 ? '↓' : '';
        const deltaSign = d > 0 ? '+' : '';
        const deltaHtml = `<small class="legend-delta" style="color:${deltaColor}">${deltaArrow}${deltaSign}${d}%</small>`;
        const onclickAttr = clickable ? ` onclick="drillDown(${i})"` : leafClickable ? ` onclick="enterNarrativeView(${i})"` : '';
        const spIdx = s.name.indexOf(' ');
        const firstPart = spIdx > 0 ? s.name.slice(0, spIdx) : '';
        const hasEmoji = firstPart && /[^\x20-\x7E]/.test(firstPart);
        const emoji = hasEmoji ? firstPart : '';
        const textName = hasEmoji ? s.name.slice(spIdx + 1) : s.name;
        const topClass = drilldownPath.length === 0 ? ' top-level' : '';
        return `<div class="legend-item${(clickable || leafClickable) ? ' clickable' : ''}${topClass}"${onclickAttr}>
            <div class="legend-color" style="background:${dataColors[i] || s.color}">${emoji}</div>
            <span>${textName} ${pct} ${deltaHtml}</span>
            ${s.desc ? `<div class="tooltip">${s.desc}</div>` : ''}
        </div>`;
    }).join('');

    el.innerHTML = html;

    // Update page title only
    if (drilldownPath.length > 0) {
        let nav = SERIES;
        const parts = [];
        for (const idx of drilldownPath) {
            parts.push(nav[idx].name);
            nav = nav[idx].children;
        }
        document.getElementById('pageTitle').textContent = 'TikTok Trends: ' + parts[parts.length - 1];
    } else {
        document.getElementById('pageTitle').textContent = 'TikTok Trends';
    }
    buildInsightPanel();
}

// ==================== INSIGHT PANEL ====================

function renderInsightSection(ol, items, key) {
    const isDesire = key === 'desire' && items.length > 0 && typeof items[0] === 'object';
    const toHtml = (x, i) => isDesire
        ? `<li class="desire-clickable" data-idx="${i}">${x.label} <span style="color:#4b5563">›</span></li>`
        : `<li>${x}</li>`;

    const visible = items.slice(0, 3);
    const hidden  = items.slice(3);

    ol.innerHTML = visible.map((x, i) => toHtml(x, i)).join('');

    if (isDesire) {
        ol.querySelectorAll('.desire-clickable').forEach(li => {
            li.addEventListener('click', () => enterDesireView(items[+li.dataset.idx]));
        });
    }

    if (hidden.length) {
        const extra = document.createElement('ol');
        extra.style.cssText = 'display:none;margin:0;padding-left:14px;flex-direction:column;gap:7px';
        extra.setAttribute('start', String(visible.length + 1));
        extra.innerHTML = hidden.map((x, j) => toHtml(x, visible.length + j)).join('');
        ol.after(extra);

        if (isDesire) {
            extra.querySelectorAll('.desire-clickable').forEach(li => {
                li.addEventListener('click', () => enterDesireView(items[+li.dataset.idx]));

        const btn = document.createElement('button');

            const expanded = extra.style.display === 'flex';
            extra.style.display = expanded ? 'none' : 'flex';
            btn.textContent = expanded ? 'see more \u25be' : 'see less \u25b4';
        });
        extra.after(btn);
    }
}

                    { name: 'Hashtag WatchIran trends weekly among young security creators', base: 5 }
                ],
                opinion: [32, 24, 18, 12, 8, 4, 2]
            },
            {
                label: '🙎🏻‍♂️ I want to stand by Israel despite world',
                narratives: [
                    { name: 'Young Israelis film defiant responses to global criticism', base: 12 },

    // Parent-level: collect desires from children that have insights
    const active = getActiveSeries();
    const allDesires = [];

    active.forEach(child => {
        if (!child.insights || !child.insights.desire) return;
        child.insights.desire.forEach(d => {
            if (!seen.has(d.label)) {

    if (allDesires.length === 0) { panel.style.display = 'none'; return; }

            "I don't want to join IDF",
            "I want IDF to fund soldier therapy" ];
    allDesires.sort((a, b) => {
        const ai = DESIRE_ORDER.indexOf(strip(a.label));
        const bi = DESIRE_ORDER.indexOf(strip(b.label));
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    });

// ==================== FILTER BAR ====================
function buildChip(filter, bar) {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.dataset.filter = filter.key;
    const sel = activeFilters[filter.key];
    const active = isFilterActive(filter.key);
    const displayLabel = getFilterDisplay(filter);
    if (active) chip.classList.add('has-value');
    chip.innerHTML =
        `<span class="filter-chip-label">${filter.label}</span>` +
        `<span class="filter-chip-sep">|</span>` +
        `<span class="filter-chip-value">${displayLabel}</span>` +
        `<svg class="filter-chip-arrow" viewBox="0 0 10 6" width="10" height="6">` +
            `<path d="M1 1l4 4 4-4" stroke="currentColor" fill="none" stroke-width="1.5"/>` +
        `</svg>` +
        `<div class="filter-dropdown">` +
            `<div class="filter-option${!active ? ' active' : ''}" data-idx="all">All</div>` +
            filter.options.slice(1).map((opt, i) =>
                `<div class="filter-option${sel.has(i + 1) ? ' active' : ''}" data-idx="${i + 1}">${opt}</div>`
            ).join('') +
        `</div>`;
    chip.addEventListener('click', (e) => {
        if (e.target.closest('.filter-option')) return;
        e.stopPropagation();
        const wasOpen = chip.classList.contains('open');
        closeAllDropdowns();
        if (!wasOpen) chip.classList.add('open');
    });
    chip.querySelectorAll('.filter-option').forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.stopPropagation();
            const idx = opt.dataset.idx;
            if (idx === 'all') { sel.clear(); }
            else { const n = parseInt(idx); if (sel.has(n)) sel.delete(n); else sel.add(n); }
            renderFilterBar();
            applyFilters();
            const updatedChip = document.getElementById('filterBar').querySelector(`[data-filter="${filter.key}"]`);
            if (updatedChip) updatedChip.classList.add('open');
        });
    });
    return chip;
}

function renderFilterBar() {
    const bar = document.getElementById('filterBar');
    bar.innerHTML = '';
    // Visible chips (first 5)
    for (let i = 0; i < VISIBLE_FILTERS && i < FILTERS.length; i++) {
        bar.appendChild(buildChip(FILTERS[i], bar));
    }
    // "More filters" button + extra container
    if (FILTERS.length > VISIBLE_FILTERS) {
        const hiddenFilters = FILTERS.slice(VISIBLE_FILTERS);
        const hasHiddenActive = hiddenFilters.some(f => isFilterActive(f.key));
        const moreBtn = document.createElement('button');
        moreBtn.className = 'filter-more-btn' + (hasHiddenActive ? ' has-hidden-active' : '');
        moreBtn.textContent = filtersExpanded ? 'Less filters' : 'More filters';
        moreBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            filtersExpanded = !filtersExpanded;
            renderFilterBar();
        });
        bar.appendChild(moreBtn);

        const extra = document.createElement('div');
        extra.className = 'filter-extra' + (filtersExpanded ? ' expanded' : '');
        for (const f of hiddenFilters) extra.appendChild(buildChip(f, bar));
        bar.appendChild(extra);
    }
    // Reset button
    const anyActive = FILTERS.some(f => isFilterActive(f.key));
    const reset = document.createElement('button');
    reset.className = 'filter-reset' + (anyActive ? ' visible' : '');
    reset.textContent = 'Reset';
    reset.addEventListener('click', (e) => {
        e.stopPropagation();
        for (const f of FILTERS) activeFilters[f.key].clear();
        renderFilterBar();
        applyFilters();
    });
    bar.appendChild(reset);
    // Sample size
    const { population, users } = computeSampleSize();
    const sizeSpan = document.createElement('span');
    sizeSpan.className = 'filter-sample-size';
    sizeSpan.textContent = `${formatPop(users)} Users  (Total population - ${formatPop(population)})`;
    bar.appendChild(sizeSpan);
}

// ==================== LIVE UPDATES ====================
function tick() {
    if (desireViewMode) return;
    const active = getActiveSeries();
    const leaf = isLeafLevel();
    const deltas = getLionRoarDeltas(active);
    dataStreams.forEach((stream, si) => {
        const orig = todayOriginal[si];
        if (orig == null) return;
        const nScale = Math.min(1, curRange.jitter);
        const noise = (Math.random() - 0.5) * (leaf ? 2 : 0.8) * nScale * 0.5;
        stream[TODAY_IDX] = Math.max(0.3, orig + noise);
    });
}

// ==================== ANIMATION LOOP ====================
function animate(now) {
    if (scanActive) {
        if (!scanStartTime) scanStartTime = now;
        const t = (now - scanStartTime) % SCAN_CYCLE;
        if (t < SCAN_SWEEP) {
            scanProgress = t / SCAN_SWEEP;                          // 0→1
        } else if (t < SCAN_SWEEP + SCAN_PAUSE) {
            scanProgress = 1;                                        // pause at end
        } else if (t < SCAN_SWEEP + SCAN_PAUSE + SCAN_SWEEP) {
            scanProgress = 1 - (t - SCAN_SWEEP - SCAN_PAUSE) / SCAN_SWEEP; // 1→0
        } else {
            scanProgress = 0;                                        // pause at start
        }
    }
    // Deep analysis reveal animation
    if (deepReversing) {
        if (!deepReversePhaseStart) deepReversePhaseStart = now;
        const elapsed = now - deepReversePhaseStart;
        if (deepReversePhase === 1) {
            // Phase 1: labels fade-out (300ms) — deepRevealProgress stays 1
            if (elapsed >= 300) { deepReversePhase = 2; deepReversePhaseStart = now; }
        } else if (deepReversePhase === 2) {
            // Phase 2: margin expand back (400ms) — deepRevealProgress stays 1
            if (elapsed >= MARGIN_ANIM_DURATION) { deepReversePhase = 3; deepReversePhaseStart = now; }
        } else if (deepReversePhase === 3) {
            // Phase 3: sweep back (1s)
            let t = elapsed / 1000;
            if (t >= 1) {
                deepReversing = false; deepAnalysisMode = false; deepRevealProgress = -1;
                deepReversePhase = 0; deepReversePhaseStart = 0;
                marginAnimStart = 0; labelFadeStart = 0;
            } else {
                deepRevealProgress = 1 - (t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2);
            }
        }
    } else if (deepRevealProgress >= 0 && deepRevealProgress < 1) {
        if (!deepRevealStartTime) deepRevealStartTime = now;
        let t = (now - deepRevealStartTime) / DEEP_REVEAL_DURATION;
        if (t >= 1) { t = 1; deepRevealProgress = 1; }
        else { deepRevealProgress = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; } // easeInOutCubic
    }
    draw();
    animFrame = requestAnimationFrame(animate);
}

function initPieCanvas() {
    const container = document.querySelector('.pie-container');
    if (!container) return;
    const size = Math.min(container.clientWidth - 40, container.clientHeight - 40, 400);
    if (size <= 0) return;
    const dpr = window.devicePixelRatio || 1;
    pieCanvas.width = size * dpr;
    pieCanvas.height = size * dpr;
    pieCanvas.style.width = size + 'px';
    pieCanvas.style.height = size + 'px';
    const barC = document.getElementById('barCanvas');
    if (barC) {
        barC.width = size * dpr;
        barC.height = size * dpr;
        barC.style.width = size + 'px';
        barC.style.height = size + 'px';
    }
}

// ==================== RESIZE HANDLE ====================
(function() {
    const handle  = document.getElementById('resizeHandle');
    const leftCol = document.getElementById('leftCol');
    let dragging = false, startX, startW;

    handle.addEventListener('mousedown', e => {
        dragging = true;
        startX = e.clientX;
        startW = leftCol.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor     = 'col-resize';
        document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const w = Math.max(100, Math.min(480, startW + e.clientX - startX));
        leftCol.style.width = w + 'px';
    });

    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor     = '';
        document.body.style.userSelect = '';
        resize(); draw();
    });
})();
