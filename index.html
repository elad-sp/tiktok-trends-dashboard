function applyCategoryEvents(active) {
    const events = getCategoryEvents();
    if (!events.length) return;
    const range = curRange;

    events.forEach(evt => {
        const startIdx = daysAgoToIndex(evt.daysAgo);
        const durPts = evt.durDays
            ? Math.max(2, Math.round(evt.durDays / range.days * TOTAL_POINTS))
            : 0;
        // Skip temp events that fully faded before range start
        if (startIdx < 0 && evt.durDays && (evt.daysAgo - evt.durDays) > 0) return;

        active.forEach((s, si) => {
            const delta = evt.deltas[si] || 0;
            if (delta === 0) return;

            if (startIdx < 0) {
                // Event before range: permanent → flat offset; faded temp → skip
                if (evt.durDays) return;
                for (let i = 0; i < dataStreams[si].length; i++) {
                    dataStreams[si][i] = Math.max(0.3, dataStreams[si][i] + delta);
                }
            } else {
                const rampPts = Math.max(1, Math.round(3 / range.days * TOTAL_POINTS));
                for (let i = startIdx; i < dataStreams[si].length; i++) {
                    const age = i - startIdx;
                    const rampUp  = Math.min(1, (age + 1) / rampPts);
                    const fadeOut = durPts ? Math.max(0, 1 - age / durPts) : 1;
                    const noise   = 1 + (Math.random() - 0.5) * 0.06;
                    dataStreams[si][i] = Math.max(0.3, dataStreams[si][i] + delta * rampUp * fadeOut * noise);
                }
            }
        });
    });
}

function generateData() {
    if (desireViewMode && activeDesire) {
        const allNarrs = activeDesire.narratives;
        const narratives = allNarrs;
        const ops = activeDesire.opinion;
        const risingCount = Math.max(1, allNarrs.length - 2);
        dataStreams = narratives.map((n, ni) => {
            const base = n.base;
            const isRising = ni < risingCount;
            // Rising: +14 to +34, Declining: -14 to -30
            const delta = isRising
                ? (14 + Math.random() * 20)
                : -(14 + Math.random() * 16);
            const startV = base - delta * 0.7;
            const endV = startV + delta;
            return buildStream([
                { t: 0,    v: Math.max(0.3, startV) },
                { t: 0.25, v: Math.max(0.3, startV + delta * 0.05) },
                { t: 0.5,  v: Math.max(0.3, startV + delta * 0.70) },
                { t: 0.75, v: Math.max(0.3, startV + delta * 0.88) },
                { t: 1,    v: Math.max(0.3, endV) },
            ]).map(v => Math.max(0.3, v));
        });
        const aggStream = Array.from({ length: TOTAL_POINTS }, (_, t) => {
            const frac = t / (TOTAL_POINTS - 1);
            const segFrac = frac * (ops.length - 1);
            const segIdx = Math.min(Math.floor(segFrac), ops.length - 2);
            const f = segFrac - segIdx;
            const a = ops[segIdx], b = ops[Math.min(segIdx + 1, ops.length - 1)];
            const net = (a.agrees - a.disagrees) * (1 - f) + (b.agrees - b.disagrees) * f;
            return net;
        });
        dataStreams.push(aggStream);
        // Apply exponential projection after TODAY_IDX (narrative streams only, NOT aggStream)
        dataStreams.slice(0, -1).forEach(ds => {
            if (ds.length > TODAY_IDX && TODAY_IDX >= 2) {
                const slope7 = ds[TODAY_IDX - 1] - ds[TODAY_IDX - 2];
                const trend = ds[TODAY_IDX] - ds[0];
                const sign = trend >= 0 ? 1 : -1;
                const slope8 = slope7 + sign * Math.max(0.3, Math.abs(slope7) * 0.15);
                const accel = slope8 - slope7;
                let prevVal = ds[TODAY_IDX];
                let curSlope = slope8;
                for (let i = TODAY_IDX + 1; i < ds.length; i++) {
                    curSlope += accel;
                    prevVal = Math.max(0.3, prevVal + curSlope);
                    ds[i] = prevVal;
                }
            }
        });
        offset = 0;
        assignColors();
        return;
    }

    const active = getActiveSeries();
    const leaf = isLeafLevel();
    const seeds = drilldownPath.length === 0
        ? computeFilteredSeeds()
        : active.map(s => s.base);

    const SPREAD = [-2.5, -1.2, 0, 1.2, 2.5];

    const jitter = curRange.jitter;

    dataStreams = active.map((s, si) => {
        const base = s.base;
        const spread = SPREAD[si] ?? 0;
        const r = () => base + (Math.random() * 2 - 1) * 3 * jitter;

        if (leaf) {
            // Born narratives: flat near-zero before the operation, spike day lifts them
            const opStart = daysAgoToIndex(OP_DAYS_AGO);
            if (s.born) {
                return Array.from({length: TOTAL_POINTS}, (_, i) =>
                    (opStart >= 0 && i < opStart)
                        ? Math.max(0.3, 0.5 + (Math.random() - 0.5) * 0.4)
                        : Math.max(0.3, base || 1)
                );
            }
            const pathKey = drilldownPath.join(',');
            const leafTrends = LEAF_TRENDS[pathKey];
            const trend = (leafTrends
                ? (leafTrends[si] ?? 0)
                : (si < 2 ? 15 : -10)) * Math.min(2, jitter);
            const startV = base + spread;
            // Clamp key points to ≥0.3 so low-base items never go negative
            return buildStream([
                { t: 0,    v: Math.max(0.3, startV) },
                { t: 0.25, v: Math.max(0.3, startV + trend * 0.2)  },
                { t: 0.5,  v: Math.max(0.3, startV + trend * 0.55) },
                { t: 0.75, v: Math.max(0.3, startV + trend * 0.85) },
                { t: 1,    v: Math.max(0.3, startV + trend) },
            ]).map(v => Math.max(0.3, v));
        } else if (drilldownPath.length === 0) {
            // Top level: gradual trend from seed toward base (no clamp)
            const startV = seeds[si] + spread;
            const n = () => (Math.random() - 0.5) * 1.5 * jitter;
            return buildStream([
                { t: 0,    v: startV },
                { t: 0.25, v: startV + (base - startV) * 0.3 + n() },
                { t: 0.5,  v: startV + (base - startV) * 0.55 + n() },
                { t: 0.75, v: startV + (base - startV) * 0.8 + n() },
                { t: 1,    v: base + n() },
            ]);
        } else {
            const startV = Math.max(base - 3 * jitter, Math.min(base + 3 * jitter, seeds[si])) + spread;
            return buildStream([
                { t: 0,    v: startV },
                { t: 0.25, v: r() },
                { t: 0.5,  v: r() },
                { t: 0.75, v: r() },
                { t: 1,    v: r() },
            ]);
        }
    });

    applyCategoryEvents(active);
    applyLionRoarSpike(active);

    // Project data after TODAY: accelerating slope, preserving event spikes at TODAY_IDX
    dataStreams.forEach(ds => {
        if (ds.length > TODAY_IDX && TODAY_IDX >= 2) {
            const slope7 = ds[TODAY_IDX - 1] - ds[TODAY_IDX - 2]; // slope at point 7→8
            const trend = ds[TODAY_IDX] - ds[0];                       // overall direction
            const sign = trend >= 0 ? 1 : -1;
            const slope8 = slope7 + sign * Math.max(0.3, Math.abs(slope7) * 0.15);
            // Don't overwrite ds[TODAY_IDX] — it includes Lion's Roar spike
            const accel = slope8 - slope7;
            let prevVal = ds[TODAY_IDX]; // start projection from spike-adjusted value
            let curSlope = slope8;
            for (let i = TODAY_IDX + 1; i < ds.length; i++) {
                curSlope += accel;
                prevVal = Math.max(0.3, prevVal + curSlope);
                ds[i] = prevVal;
            }
        }
    });

    offset = 0;
    todayOriginal = dataStreams.map(ds => ds[TODAY_IDX]);
    assignColors();

    // Compute top 2 changers + deltas as pie-chart percentages (actual data only, up to TODAY)
    topTwoChangers = new Set();
    seriesDeltas = [];
    const n = Math.min(active.length, dataStreams.length);
    if (n >= 1) {
        const totalFirst = dataStreams.reduce((sum, ds) => sum + ds[0], 0);
        const totalToday = dataStreams.reduce((sum, ds) => sum + ds[Math.min(TODAY_IDX, ds.length - 1)], 0);
        const changes = [];
        for (let i = 0; i < n; i++) {
            const s = dataStreams[i];
            const pctFirst = (s[0] / totalFirst) * 100;
            const pctToday = (s[Math.min(TODAY_IDX, s.length - 1)] / totalToday) * 100;
            const delta = pctToday - pctFirst;
            seriesDeltas.push(Math.round(delta));
            changes.push({ i, c: Math.abs(delta) });
        }
        if (n >= 2) {
            changes.sort((a, b) => b.c - a.c);
            topTwoChangers.add(changes[0].i);
            topTwoChangers.add(changes[1].i);
        }
    }

    // Build desire aggregate streams for narrative view
    desireAggStreams = [];
    if (narrativeViewMode && activeNarrativeIdx !== null) {
        const narr = active[activeNarrativeIdx];
        if (narr && narr.insights && narr.insights.desire) {
            // Get parent narrative stream to modulate desire trends
            const narrStream = dataStreams[activeNarrativeIdx];
            const narrSlice = narrStream ? narrStream.slice(0, TODAY_IDX + 1) : [];
            const narrMean = narrSlice.length > 0
                ? narrSlice.reduce((s, v) => s + v, 0) / narrSlice.length : 1;

            narr.insights.desire.slice(0, 3).forEach((d, di) => {
                const ops = d.opinion;
                const stream = Array.from({ length: TOTAL_POINTS }, (_, t) => {
                    const frac = t / (TOTAL_POINTS - 1);
                    const segFrac = frac * (ops.length - 1);
                    const segIdx = Math.min(Math.floor(segFrac), ops.length - 2);
                    const f = segFrac - segIdx;
                    const a = ops[segIdx], b = ops[Math.min(segIdx + 1, ops.length - 1)];
                    const net = (a.agrees - a.disagrees) * (1 - f) + (b.agrees - b.disagrees) * f;
                    const baseVal = 50 + net / 2;
                    // Modulate by parent narrative trend
                    const narrVal = narrStream ? (narrStream[t] || narrMean) : narrMean;
                    const narrDev = (narrVal - narrMean) / Math.max(1, narrMean);
                    return Math.max(0, Math.min(100, baseVal * (1 + narrDev * 0.5)));
                });
                desireAggStreams.push({ label: d.label, opinion: ops, stream, color: DESIRE_AGG_COLORS[di] });
            });
        }
    }
}

// Blue = rising endpoint vs start, Yellow = falling
function assignColors() {
    if (desireViewMode && activeDesire) {
        const allNarrs = activeDesire.narratives;
        dataColors = [
            ...allNarrs.map((_, i) => SERIES_COLORS[i % SERIES_COLORS.length]),
            '#ffffff'
        ];
        return;
    }
    dataColors = dataStreams.map((_, i) => SERIES_COLORS[i % SERIES_COLORS.length]);
}

function addDataPoint() {
    const active = getActiveSeries();
    const leaf = isLeafLevel();
    const last = dataStreams.map(s => s[s.length - 1]);
    const next = last.map((v, si) => {
        if (leaf) return Math.round((v + (Math.random() - 0.5) * 1.5) * 10) / 10;
        const base = active[si].base;
        const jittered = v + (Math.random() - 0.5) * 1.5;
        return Math.max(base - 3, Math.min(base + 3, Math.round(jittered * 10) / 10));
    });
    next.forEach((v, si) => dataStreams[si].push(v));
    offset++;
}

// ==================== CHART GEOMETRY ====================
const MARGIN = { top: 10, right: 30, bottom: 40, left: 45 };

function chartW() { return (canvas.width / (window.devicePixelRatio || 1)) - MARGIN.left - MARGIN.right; }
function chartH() { return (canvas.height / (window.devicePixelRatio || 1)) - MARGIN.top - MARGIN.bottom; }

function xForIndex(i)  { return MARGIN.left + (i / (VISIBLE_POINTS - 1)) * chartW(); }
let yAxisMin = 0, yAxisMax = 50;
function yForValue(v)  { return MARGIN.top + (1 - (v - yAxisMin) / (yAxisMax - yAxisMin)) * chartH(); }
function indexForX(px) {
    const ratio = (px - MARGIN.left) / chartW();
    return Math.max(0, Math.min(VISIBLE_POINTS - 1, ratio * (VISIBLE_POINTS - 1)));
}

// ==================== INTERPOLATION ====================
function getValueAtFloat(seriesIdx, floatIdx) {
    const i = offset + floatIdx;
    const lo = Math.floor(i);
    const hi = Math.ceil(i);
    const stream = dataStreams[seriesIdx];
    if (lo < 0 || hi >= stream.length) return stream[Math.min(Math.max(lo, 0), stream.length - 1)];
    if (lo === hi) return stream[lo];
    return stream[lo] * (1 - (i - lo)) + stream[hi] * (i - lo);
}

// ==================== DRAW ====================
function draw() {
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, h);

    // Compute dynamic Y range from visible data
    if (desireViewMode) {
        yAxisMin = 0; yAxisMax = 100;
    } else {
        let dMin = Infinity, dMax = -Infinity;
        dataStreams.forEach(stream => {
            for (let i = offset; i < offset + VISIBLE_POINTS && i < stream.length; i++) {
                if (stream[i] < dMin) dMin = stream[i];
                if (stream[i] > dMax) dMax = stream[i];
            }
        });
        if (dMin === Infinity) { dMin = 0; dMax = 50; }
        // Add small padding and round to nice numbers
        const range = Math.max(5, dMax - dMin);
        const pad = range * 0.06;
        yAxisMin = Math.max(0, Math.floor((dMin - pad) / 5) * 5);
        yAxisMax = Math.ceil((dMax + pad) / 5) * 5;
        if (yAxisMax - yAxisMin < 10) yAxisMax = yAxisMin + 10;
    }

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    const _gridStep = desireViewMode ? 25 : Math.max(5, Math.round((yAxisMax - yAxisMin) / 5 / 5) * 5) || 5;
    for (let v = yAxisMin; v <= yAxisMax; v += _gridStep) {
        const y = yForValue(v);
        ctx.beginPath(); ctx.moveTo(MARGIN.left, y); ctx.lineTo(MARGIN.left + chartW(), y); ctx.stroke();
        ctx.fillStyle = '#4b5563';
        ctx.font = '11px system-ui';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(v) + '%', MARGIN.left - 8, y + 4);
    }

    // ==================== DESIRE NARRATIVE ZONE (bottom 20%) ====================
    let narrZoneTop = 0, narrZoneBot = 0, narrMax = 1;
    if (desireViewMode && activeDesire) {
        narrZoneTop = yForValue(20);  // pixel Y at 20%
        narrZoneBot = yForValue(0);   // pixel Y at 0%
        // Zone backgrounds
        ctx.fillStyle = 'rgba(15, 23, 42, 0.3)';
        ctx.fillRect(MARGIN.left, MARGIN.top, chartW(), narrZoneTop - MARGIN.top);
        ctx.fillStyle = 'rgba(30, 41, 59, 0.25)';
        ctx.fillRect(MARGIN.left, narrZoneTop, chartW(), narrZoneBot - narrZoneTop);
        // Compute narrMax from visible narrative streams (exclude aggregate = last stream)
        const narrCount = activeDesire.narratives.length;
        narrMax = 0;
        for (let si = 0; si < narrCount; si++) {
            const stream = dataStreams[si];
            if (!stream) continue;
            for (let i = offset; i < offset + VISIBLE_POINTS && i < stream.length; i++)
                if (stream[i] > narrMax) narrMax = stream[i];
        }
        if (narrMax < 1) narrMax = 1;
        narrMax *= 1.1; // 10% padding

        // K tick marks — round numbers (100K, 200K, 300K...) left side only
        ctx.save();
        const maxK = Math.ceil(narrMax * DESIRE_EXPOSURE_SCALE / 100) * 100;
        const kStep = maxK <= 200 ? 50 : 100;
        for (let kv = kStep; kv <= maxK; kv += kStep) {
            const rawV = kv / DESIRE_EXPOSURE_SCALE;
            if (rawV > narrMax) break;
            const frac = rawV / narrMax;
            const y = narrZoneBot - frac * (narrZoneBot - narrZoneTop);
            // Grid line
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(MARGIN.left, y); ctx.lineTo(MARGIN.left + chartW(), y); ctx.stroke();
            // Label on left
            ctx.fillStyle = '#64748b';
            ctx.font = '10px system-ui';
            ctx.textAlign = 'right';
            ctx.fillText(kv + 'K', MARGIN.left - 8, y + 3);
        }
        // Dashed separator at 20%
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(MARGIN.left, narrZoneTop); ctx.lineTo(MARGIN.left + chartW(), narrZoneTop); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    }
    function yForNarrative(v) {
        const frac = Math.max(0, v) / narrMax;
        return narrZoneBot - frac * (narrZoneBot - narrZoneTop);
    }

    // ==================== DEEP ANALYSIS MARGIN ====================
    const savedMarginRight = MARGIN.right;
    const deepRevealing = deepAnalysisMode && deepRevealProgress >= 0 && deepRevealProgress < 1 && (!deepReversing || deepReversePhase === 3);
    const deepRevealed  = deepAnalysisMode && !deepReversing && deepRevealProgress >= 1;
    if (deepAnalysisMode && desireViewMode && activeDesire) {
        if (deepReversing) {
            if (deepReversePhase === 1) {
                // Phase 1: labels fading, margin stays at 190
                MARGIN.right = 190;
            } else if (deepReversePhase === 2) {
                // Phase 2: margin 190→30
                const mt = Math.min(1, (performance.now() - deepReversePhaseStart) / MARGIN_ANIM_DURATION);
                const eased = mt < 0.5 ? 4*mt*mt*mt : 1 - Math.pow(-2*mt+2,3)/2;
                MARGIN.right = 190 - 160 * eased;
            }
            // Phase 3: margin already at 30, sweep back
        } else if (deepRevealed) {
            // Post-reveal: animate margin 30→190
            if (!marginAnimStart) marginAnimStart = performance.now();
            const mt = Math.min(1, (performance.now() - marginAnimStart) / MARGIN_ANIM_DURATION);
            const eased = mt < 0.5 ? 4*mt*mt*mt : 1 - Math.pow(-2*mt+2,3)/2;
            MARGIN.right = 30 + 160 * eased;
        }
        // During reveal: MARGIN.right stays 30 (default)
    }

    // X labels — snap to meaningful calendar dates (after margin is set)
    const tickXPositions = drawTimeAxis(ctx) || [];
    const bottomY = MARGIN.top + chartH();

    const revealX = deepRevealing ? MARGIN.left + deepRevealProgress * chartW() : 0;

    if (deepAnalysisMode && desireViewMode && activeDesire) {
        const aggSi = activeDesire.narratives.length;
        const N = Math.min(VISIBLE_POINTS, dataStreams[aggSi]?.length || 0);
        if (N > 1) {
            const xs = [], aggVals = [], natVals = [], chinaVals = [], russiaVals = [];
            for (let i = 0; i < N; i++) {
                const v = dataStreams[aggSi][i];
                const t = i / (TOTAL_POINTS - 1);
                xs.push(xForIndex(i));
                aggVals.push(v);
                // Layers split WITHIN aggVals: Natural < China < Russia < Bots = aggVals
                // Contamination: flat until ~1 month ago, then ramps up. Never decreasing.
                const tRamp = 0.55; // ~1 month ago
                let natV, chiV, rusV;
                // Natural rises gently from the start
                const v0 = dataStreams[aggSi][0];
                const natBase = v0 * 0.82;
                if (t <= tRamp) {
                    natV = natBase * (1 + 0.3 * t);       // gentle rise
                    chiV = v * 0.87;
                    rusV = v * 0.92;
                } else {
                    const p = (t - tRamp) / (1 - tRamp);
                    natV = natBase * (1 + 0.3 * tRamp) + natBase * 0.25 * p;
                    chiV = v * (0.87 - 0.47 * p);
                    rusV = v * (0.92 - 0.20 * p);
                }
                // Enforce monotonic non-decreasing (never dip)
                if (natVals.length > 0) natV = Math.max(natV, natVals[natVals.length - 1]);
                if (chinaVals.length > 0) chiV = Math.max(chiV, chinaVals[chinaVals.length - 1]);
                if (russiaVals.length > 0) rusV = Math.max(rusV, russiaVals[russiaVals.length - 1]);
                // Ensure minimum upward slope once contamination started rising
                [chinaVals, russiaVals].forEach(arr => {
                    if (arr.length > 1) {
                        const prev = arr[arr.length - 1], prev2 = arr[arr.length - 2];
                        if (prev > prev2) {
                            const minNext = prev + (prev - prev2) * 0.5;
                            if (arr === chinaVals) chiV = Math.max(chiV, minNext);
                            else rusV = Math.max(rusV, minNext);
                        }
                    }
                });
                // Cap at aggVals
                natVals.push(Math.min(natV, v));
                chinaVals.push(Math.min(chiV, v));
                russiaVals.push(Math.min(rusV, v));
                // botsVals = aggVals (top layer goes to the white line)
            }
            function fillBand(xArr, bot, top, color, alpha) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(xArr[0], yForValue(bot[0]));
                for (let i = 1; i < xArr.length; i++) ctx.lineTo(xArr[i], yForValue(bot[i]));
                for (let i = xArr.length - 1; i >= 0; i--) ctx.lineTo(xArr[i], yForValue(top[i]));
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            // -- Clip to revealed region during animation --
            if (deepRevealing) ctx.save(), ctx.beginPath(), ctx.rect(MARGIN.left, 0, revealX - MARGIN.left, h), ctx.clip();

            const zeros = xs.map(() => 0);
            for (let phase = 0; phase < 2; phase++) {
                const s0 = phase === 0 ? 0 : TODAY_IDX;
                const e0 = phase === 0 ? Math.min(TODAY_IDX + 1, N) : N;
                if (e0 - s0 < 2) continue;
                const alpha = phase === 0 ? 0.8 : 0.3;
                const xS = xs.slice(s0, e0);
                fillBand(xS, zeros.slice(s0,e0),         natVals.slice(s0,e0),    '#0a2033', alpha);  // Natural
                fillBand(xS, natVals.slice(s0,e0),      chinaVals.slice(s0,e0),  '#78350f', alpha);  // China
                fillBand(xS, chinaVals.slice(s0,e0),    russiaVals.slice(s0,e0), '#1e3a8a', alpha);  // Russia
                fillBand(xS, russiaVals.slice(s0,e0),   aggVals.slice(s0,e0),    '#7f1d1d', alpha);  // Bots
            }
            // China boundary dashed line
            ctx.save();
            ctx.strokeStyle = '#d97706';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 4]);
            ctx.globalAlpha = 0.85;
            ctx.beginPath();
            for (let i = 0; i < N; i++) {
                if (i === 0) ctx.moveTo(xs[i], yForValue(chinaVals[i]));
                else ctx.lineTo(xs[i], yForValue(chinaVals[i]));
            }
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
            // Russia boundary dashed line
            ctx.save();
            ctx.strokeStyle = '#93c5fd';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 4]);
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            for (let i = 0; i < N; i++) {
                if (i === 0) ctx.moveTo(xs[i], yForValue(russiaVals[i]));
                else ctx.lineTo(xs[i], yForValue(russiaVals[i]));
            }
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
            // Redraw white aggregate line on top
            ctx.save();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            for (let i = 0; i <= Math.min(TODAY_IDX, N-1); i++) {
                if (i === 0) ctx.moveTo(xs[i], yForValue(aggVals[i]));
                else ctx.lineTo(xs[i], yForValue(aggVals[i]));
            }
            ctx.stroke();
            if (N > TODAY_IDX + 1) {
                ctx.setLineDash([6, 4]);
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                for (let i = TODAY_IDX; i < N; i++) {
                    if (i === TODAY_IDX) ctx.moveTo(xs[i], yForValue(aggVals[i]));
                    else ctx.lineTo(xs[i], yForValue(aggVals[i]));
                }
                ctx.stroke();
                ctx.setLineDash([]);
            }
            ctx.restore();
            // --- Right-margin labels ---
            const lastAgg     = aggVals[N - 1];
            const lastNat     = natVals[N - 1];
            const lastChina   = chinaVals[N - 1];
            const lastRussia  = russiaVals[N - 1];
            ctx.globalAlpha = 1;
            // Band boundaries in pixels
            const yAgg    = yForValue(lastAgg);
            const yRussia = yForValue(lastRussia);
            const yChina  = yForValue(lastChina);
            const yNat    = yForValue(lastNat);
            const yZero   = yForValue(0);
            const chartRight = w - MARGIN.right;
            // Helper: draw flag/bot icon at given position (icon drawn to right of x)
            function drawIconAt(x, y, type) {
                ctx.save();
                ctx.shadowBlur = 0;
                if (type === 'russia') {
                    const fw = 16, fh = 10, sh = Math.round(fh / 3);
                    ctx.fillStyle = '#fff';    ctx.fillRect(x, y - fh/2, fw, sh);
                    ctx.fillStyle = '#0039a6'; ctx.fillRect(x, y - fh/2 + sh, fw, sh);
                    ctx.fillStyle = '#d52b1e'; ctx.fillRect(x, y - fh/2 + sh*2, fw, fh - sh*2);
                } else if (type === 'china') {
                    const fw = 16, fh = 10;
                    ctx.fillStyle = '#de2910'; ctx.fillRect(x, y - fh/2, fw, fh);
                    ctx.fillStyle = '#ffde00'; ctx.font = 'bold 9px system-ui';
                    ctx.textAlign = 'left'; ctx.fillText('★', x + 2, y + 3);
                } else if (type === 'bot') {
                    const cx = x + 8, cy = y;
                    ctx.fillStyle = '#6b7280';
                    ctx.beginPath(); ctx.roundRect(cx - 7, cy - 6, 14, 12, 2); ctx.fill();
                    ctx.fillStyle = '#38bdf8';
                    ctx.beginPath(); ctx.arc(cx - 3, cy - 1, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + 3, cy - 1, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.fillRect(cx - 3, cy + 2, 6, 1.5);
                    ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(cx, cy - 6); ctx.lineTo(cx, cy - 10); ctx.stroke();
                    ctx.fillStyle = '#f87171';
                    ctx.beginPath(); ctx.arc(cx, cy - 10, 1.5, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
            // Draw right-margin label for each band
            function drawRightLabel(bandTop, bandBot, title, subtitle, iconType, color) {
                const cy = (bandTop + bandBot) / 2;
                const labelX = chartRight + 8;
                // Icon
                const textStartX = labelX + 4;
                if (iconType) {
                    drawIconAt(textStartX, cy - 2, iconType);
                }
                // Title
                const titleX = iconType ? textStartX + 22 : textStartX;
                ctx.save();
                ctx.textAlign = 'left';
                ctx.font = 'bold 13px system-ui';
                ctx.fillStyle = color;
                ctx.fillText(title, titleX, subtitle ? cy - 3 : cy + 4);
                // Subtitle
                if (subtitle) {
                    ctx.font = '11px system-ui';
                    ctx.globalAlpha = 0.7;
                    ctx.fillText(subtitle, titleX, cy + 12);
                }
                ctx.restore();
            }
            // Label visibility
            const marginDone = marginAnimStart && (performance.now() - marginAnimStart) >= MARGIN_ANIM_DURATION;
            if (marginDone && !labelFadeStart) labelFadeStart = performance.now();
            let labelAlpha = 0;
            if (deepReversing && deepReversePhase === 1) {
                // Phase 1: fade out labels over 300ms
                const ft = Math.min(1, (performance.now() - deepReversePhaseStart) / 300);
                labelAlpha = 1 - ft;
            } else if (labelFadeStart) {
                // Forward: fade in after margin done
                labelAlpha = Math.min(1, (performance.now() - labelFadeStart) / 400);
            }
            if (labelAlpha > 0) {
                ctx.globalAlpha = labelAlpha;
                drawRightLabel(yAgg, yRussia, 'BOTS', 'Bots & influence campaign', 'bot', '#fca5a5');
                drawRightLabel(yRussia, yChina, 'RUSSIA', 'Algorithm Attack', 'russia', '#93c5fd');
                drawRightLabel(yChina, yNat, 'CHINA', 'Algorithmic manipulation', 'china', '#fbbf24');
                drawRightLabel(yNat, yZero, 'Natural', null, null, '#94a3b8');
                ctx.globalAlpha = 1;
            }

            // -- End clip and draw metallic scan line --
            if (deepRevealing) {
                ctx.restore(); // end clip
                // Metallic blue scan line
                ctx.save();
                const lineX = revealX;
                const topY = MARGIN.top;
                // Glow
                ctx.shadowColor = '#60a5fa';
                ctx.shadowBlur = 18;
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(lineX, topY);
                ctx.lineTo(lineX, bottomY);
                ctx.stroke();
                // Core bright line
                ctx.shadowBlur = 0;
                const grad = ctx.createLinearGradient(0, topY, 0, bottomY);
                grad.addColorStop(0, '#1e3a8a');
                grad.addColorStop(0.3, '#60a5fa');
                grad.addColorStop(0.5, '#93c5fd');
                grad.addColorStop(0.7, '#60a5fa');
                grad.addColorStop(1, '#1e3a8a');
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(lineX, topY);
                ctx.lineTo(lineX, bottomY);
                ctx.stroke();
                // Faint side streaks (metallic shimmer)
                ctx.globalAlpha = 0.2;
                ctx.strokeStyle = '#93c5fd';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(lineX - 4, topY);
                ctx.lineTo(lineX - 4, bottomY);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(lineX + 4, topY);
                ctx.lineTo(lineX + 4, bottomY);
                ctx.stroke();
                ctx.restore();
            }
        }
    }
    getActiveSeries().forEach((s, si) => {
        const isAgg = desireViewMode && s.isDesireAggregate;
        // In narrativeViewMode, only draw the active narrative line
        if (narrativeViewMode && si !== activeNarrativeIdx) return;
        // In deep analysis mode (fully revealed or reverse phases 1-2), skip all series
        if ((deepRevealed || (deepReversing && deepReversePhase <= 2)) && desireViewMode) return;
        // During reveal animation: only draw aggregate line, clipped to right of scan line
        if (deepRevealing && desireViewMode) {
            if (!isAgg) return;
            ctx.save();
            ctx.beginPath();
            ctx.rect(revealX, 0, w - revealX, h);
            ctx.clip();
        }
        // Build point list
        const pts = [];
        for (let i = 0; i < VISIBLE_POINTS; i++) {
            const idx = offset + i;
            if (idx >= dataStreams[si].length) break;
            const yFn = (desireViewMode && !isAgg) ? yForNarrative : yForValue;
            pts.push({ x: xForIndex(i), y: yFn(dataStreams[si][idx]) });
        }
        if (pts.length === 0) return;

        const col = dataColors[si] || s.color;

        // Split points: actual data (0..TODAY_IDX) vs projection (TODAY_IDX..)
        const actualPts = pts.slice(0, TODAY_IDX + 1);
        const projPts   = pts.slice(TODAY_IDX); // includes TODAY point for continuity

        if (!desireViewMode) {
            // Gradient fill under actual data only (up to TODAY)
            const grad = ctx.createLinearGradient(0, MARGIN.top, 0, bottomY);
            grad.addColorStop(0, col + '30');
            grad.addColorStop(1, col + '00');
            ctx.beginPath();
            ctx.moveTo(actualPts[0].x, actualPts[0].y);
            actualPts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
            ctx.lineTo(actualPts[actualPts.length - 1].x, bottomY);
            ctx.lineTo(actualPts[0].x, bottomY);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();
        }

        // Actual data line (solid)
        ctx.globalAlpha = (desireViewMode && !isAgg) ? 0.55 : 1;
        ctx.beginPath();
        ctx.strokeStyle = col;
        ctx.lineWidth = isAgg ? 5 : (desireViewMode ? 1.5 : 2);
        ctx.lineJoin = 'round';
        actualPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();

        // Projected data line (dashed, same color)
        if (projPts.length > 1) {
            ctx.save();
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = col;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            projPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }
        ctx.globalAlpha = 1;

        if (!desireViewMode) {
            // Solid dots on actual data
            actualPts.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#0f1623';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = col;
                ctx.fill();
            });
            // Hollow diamond dots on projected data (skip first = TODAY overlap)
            projPts.slice(1).forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(Math.PI / 4);
                ctx.fillStyle = '#0f1623';
                ctx.fillRect(-4, -4, 8, 8);
                ctx.strokeStyle = col;
                ctx.lineWidth = 1.5;
                ctx.strokeRect(-4, -4, 8, 8);
                ctx.restore();
            });
        }
        // Dots on aggregate line in desire view
        if (desireViewMode && isAgg) {
            actualPts.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#0f1623';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = col;
                ctx.fill();
            });
            // Diamond dots on projected data
            projPts.slice(1).forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(Math.PI / 4);
                ctx.fillStyle = '#0f1623';
                ctx.fillRect(-4, -4, 8, 8);
                ctx.strokeStyle = col;
                ctx.lineWidth = 1.5;
                ctx.strokeRect(-4, -4, 8, 8);
                ctx.restore();
            });
        }
        // Restore clip if revealing
        if (deepRevealing && desireViewMode) ctx.restore();
    });

    // Desire aggregate lines in narrative view
    if (narrativeViewMode && desireAggStreams.length > 0) {
        desireAggStreams.forEach(da => {
            const toY = v => MARGIN.top + (1 - (v - 0) / (100 - 0)) * chartH();
            // Solid line up to TODAY
            ctx.save();
            ctx.globalAlpha = 0.7;
            ctx.strokeStyle = da.color;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            const limit = Math.min(TODAY_IDX + 1, da.stream.length);
            for (let i = 0; i < limit; i++) {
                const x = xForIndex(i);
                const y = toY(da.stream[offset + i]);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
            // Dashed projection after TODAY
            ctx.save();
            ctx.globalAlpha = 0.45;
            ctx.strokeStyle = da.color;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            for (let i = TODAY_IDX; i < VISIBLE_POINTS && (offset + i) < da.stream.length; i++) {
                const x = xForIndex(i);
                const y = toY(da.stream[offset + i]);
                if (i === TODAY_IDX) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        });
    }

    // Blue pie-share line in narrative view (tracks active narrative's % of total)
    if (narrativeViewMode && activeNarrativeIdx != null) {
        const toY = v => MARGIN.top + (1 - v / 100) * chartH();
        const PIE_LINE_COLOR = '#2563eb';
        // Build share points
        const actPts = [], prjPts = [];
        for (let i = 0; i < VISIBLE_POINTS; i++) {
            const idx = offset + i;
            const total = dataStreams.reduce((sum, ds) => sum + (ds[idx] || 0), 0);
            const val = dataStreams[activeNarrativeIdx] ? (dataStreams[activeNarrativeIdx][idx] || 0) : 0;
            const share = total > 0 ? (val / total) * 100 : 0;
            const pt = { x: xForIndex(i), y: toY(share) };
            if (i <= TODAY_IDX) actPts.push(pt);
            if (i >= TODAY_IDX) prjPts.push(pt);
        }
        // Solid line up to TODAY
        ctx.save();
        ctx.strokeStyle = PIE_LINE_COLOR;
        ctx.lineWidth = 4;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        actPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();
        // Dots
        actPts.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#0f1623';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = PIE_LINE_COLOR;
            ctx.fill();
        });
        ctx.restore();
        // Dashed projection
        if (prjPts.length > 1) {
            ctx.save();
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = PIE_LINE_COLOR;
            ctx.lineWidth = 4;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            prjPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.stroke();
            ctx.setLineDash([]);
            // Diamond dots on projected
            prjPts.slice(1).forEach(p => {
                ctx.translate(p.x, p.y);
                ctx.rotate(Math.PI / 4);
                ctx.fillStyle = '#0f1623';
                ctx.fillRect(-4, -4, 8, 8);
                ctx.strokeStyle = PIE_LINE_COLOR;
                ctx.lineWidth = 1.5;
                ctx.strokeRect(-4, -4, 8, 8);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                const dpr = window.devicePixelRatio || 1;
                ctx.scale(dpr, dpr);
            });
            ctx.restore();
        }
    }

    // TODAY vertical dashed line
    {
        const todayX = xForIndex(TODAY_IDX);
        ctx.save();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(todayX, MARGIN.top);
        ctx.lineTo(todayX, bottomY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 11px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('TODAY', todayX, MARGIN.top + 14);
        ctx.restore();
    }

    // Hover interaction + scan line + pie (always visible)
    const hovering = mouseInside && mouseX >= MARGIN.left && mouseX <= MARGIN.left + chartW();
    const floatIdx = hovering
        ? indexForX(mouseX)
        : scanProgress * TODAY_IDX;
    const snapX = xForIndex(floatIdx);

    const values = [];
    getActiveSeries().forEach((s, si) => {
        const val = getValueAtFloat(si, floatIdx);
        values.push(val);
        // In narrativeViewMode, only draw hover dot for active narrative
        if (narrativeViewMode && si !== activeNarrativeIdx) return;
        // In deep analysis mode, hide narrative dots once the reveal line passes them
        if (deepAnalysisMode && desireViewMode && !s.isDesireAggregate) {
            if (deepRevealed || (deepRevealing && snapX <= revealX)) return;
        }
        const isAgg = desireViewMode && s.isDesireAggregate;
        const y = (desireViewMode && !isAgg) ? yForNarrative(val) : yForValue(val);
        const hc = dataColors[si] || s.color;
        ctx.beginPath();
        ctx.arc(snapX, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = hc;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(snapX, y, 8, 0, Math.PI * 2);
        ctx.strokeStyle = hc;
        ctx.globalAlpha = 0.3;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.globalAlpha = 1;
    });

    // Desire aggregate dots at scan/hover position
    if (narrativeViewMode && desireAggStreams.length > 0) {
        desireAggStreams.forEach(da => {
            const fi = offset + floatIdx;
            const lo = Math.floor(fi), hi = Math.ceil(fi);
            const vLo = da.stream[lo], vHi = da.stream[Math.min(hi, da.stream.length - 1)];
            if (vLo == null) return;
            const v = lo === hi ? vLo : vLo + (vHi - vLo) * (fi - lo);
            const y = yForNarrative(v);
            ctx.beginPath();
            ctx.arc(snapX, y, 4, 0, Math.PI * 2);
            ctx.fillStyle = da.color;
            ctx.fill();
        });
    }

    if (desireViewMode && activeDesire) {
        // Toggle pie vs bar canvas
        const _barC = document.getElementById('barCanvas');
        const _pieC = document.getElementById('pieCanvas');
        if (_barC) _barC.style.display = offlineMode ? 'block' : 'none';
        if (_pieC) _pieC.style.display = offlineMode ? 'none' : 'block';

        const aggSi = activeDesire.narratives.length;
        const aggY = yForValue(getValueAtFloat(aggSi, floatIdx));
        const ops = activeDesire.opinion;
        const frac = floatIdx / (VISIBLE_POINTS - 1);
        const segFrac = frac * (ops.length - 1);
        const segIdx = Math.min(Math.floor(segFrac), ops.length - 2);
        const f = segFrac - segIdx;
        const a = ops[segIdx], b = ops[Math.min(segIdx + 1, ops.length - 1)];
        const opAtPoint = {
            agrees:    Math.round(a.agrees    * (1 - f) + b.agrees    * f),
            unsure:    Math.round(a.unsure    * (1 - f) + b.unsure    * f),
            disagrees: Math.round(a.disagrees * (1 - f) + b.disagrees * f),
        };
        if (offlineMode) {
            drawBarChart(floatIdx, values);
        } else {
            drawDesirePie(snapX, aggY, opAtPoint);
        }
        // Update desire legend values at hover/scan position
        const narrCount = activeDesire.narratives.length;
        const narrValues = values.slice(0, narrCount);
        const narrTotal = narrValues.reduce((s, v) => s + v, 0);
        if (narrTotal > 0) updateLegendValues(narrValues, narrTotal);
    } else {
        drawPieAtCursor(snapX, mouseY, values);
    }

    // Mini pies for top 3 desires in narrative view — HIDDEN for now
    const miniCanvas = document.getElementById('miniPiesCanvas');
    if (false && narrativeViewMode && desireAggStreams.length > 0) {
        miniCanvas.style.display = 'block';
        const dpr = window.devicePixelRatio || 1;
        const mRect = miniCanvas.parentElement.getBoundingClientRect();
        const mW = mRect.width;
        const miniR = getPieRadius() * 0.7;
        const mH = 2 * miniR + 55;
        miniCanvas.width = mW * dpr;
        miniCanvas.height = mH * dpr;
        miniCanvas.style.width = mW + 'px';
        miniCanvas.style.height = mH + 'px';
        const mCtx = miniCanvas.getContext('2d');
        mCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        mCtx.clearRect(0, 0, mW, mH);
        const spacing = mW / 3;
        const PIE_AGREES = '#3b82f6', PIE_UNDECIDED = '#64748b', PIE_DISAGREES = '#ec4899';
        const legendW = 105;
        const titleH = 22;

        desireAggStreams.forEach((da, di) => {
            const secL = spacing * di;
            const pieCx = secL + legendW + miniR + 8;
            const pieCy = titleH + miniR + 4;

            // --- Desire label above pie (strip all leading emoji sequences) ---
            mCtx.save();
            mCtx.font = 'bold 13px system-ui';
            mCtx.fillStyle = '#e2e8f0';
            mCtx.textAlign = 'center';
            const cleanLabel = da.label.replace(/^[\p{Emoji}\p{Emoji_Component}\u200D\uFE0F\u200B]+\s*/u, '');
            const maxLabelW = spacing - 20;
            let displayLabel = cleanLabel;
            while (mCtx.measureText(displayLabel).width > maxLabelW && displayLabel.length > 3) {
                displayLabel = displayLabel.slice(0, -1);
            }
            if (displayLabel.length < cleanLabel.length) displayLabel += '…';
            mCtx.fillText(displayLabel, pieCx, 15);
            mCtx.restore();

            // --- Data ---
            const ops = da.opinion;
            const frac = floatIdx / (VISIBLE_POINTS - 1);
            const segFrac = frac * (ops.length - 1);
            const segIdx = Math.min(Math.floor(segFrac), ops.length - 2);
            const f = segFrac - segIdx;
            const oa = ops[segIdx], ob = ops[Math.min(segIdx + 1, ops.length - 1)];
            const agrees = Math.round(oa.agrees * (1 - f) + ob.agrees * f);
            const unsure = Math.round(oa.unsure * (1 - f) + ob.unsure * f);
            const disagrees = Math.round(oa.disagrees * (1 - f) + ob.disagrees * f);
            const total = agrees + unsure + disagrees;
            if (total === 0) return;

            // --- Shadow disc ---
            mCtx.save();
            mCtx.shadowColor = 'rgba(0,0,0,0.5)';
            mCtx.shadowBlur = 20;
            mCtx.beginPath();
            mCtx.arc(pieCx, pieCy, miniR + 2, 0, Math.PI * 2);
            mCtx.fillStyle = '#0f1623';
            mCtx.fill();
            mCtx.restore();

            // --- Pie slices ---
            const slices = [
                { val: agrees, color: PIE_AGREES, label: 'Agrees', pct: Math.round(agrees / total * 100) },
                { val: unsure, color: PIE_UNDECIDED, label: 'Undecided', pct: Math.round(unsure / total * 100) },
                { val: disagrees, color: PIE_DISAGREES, label: 'Disagrees', pct: Math.round(disagrees / total * 100) },
            ];
            const GAP = 0.025;
            let angle = -Math.PI / 2;
            slices.forEach(({ val, color }) => {
                const a = (val / total) * Math.PI * 2;
                const mid = angle + a / 2;
                mCtx.globalAlpha = 0.4;
                mCtx.beginPath();
                mCtx.moveTo(pieCx, pieCy);
                mCtx.arc(pieCx, pieCy, miniR, angle + GAP / 2, angle + a - GAP / 2);
                mCtx.closePath();
                mCtx.fillStyle = color;
                mCtx.fill();
                mCtx.globalAlpha = 0.18;
                const grad = mCtx.createRadialGradient(
                    pieCx + Math.cos(mid) * miniR * 0.3,
                    pieCy + Math.sin(mid) * miniR * 0.3 - miniR * 0.15,
                    0, pieCx, pieCy, miniR
                );
                grad.addColorStop(0, 'rgba(255,255,255,0.7)');
                grad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
                grad.addColorStop(1, 'rgba(0,0,0,0.15)');
                mCtx.beginPath();
                mCtx.moveTo(pieCx, pieCy);
                mCtx.arc(pieCx, pieCy, miniR, angle + GAP / 2, angle + a - GAP / 2);
                mCtx.closePath();
                mCtx.fillStyle = grad;
                mCtx.fill();
                mCtx.globalAlpha = 1;
                angle += a;
            });

            // --- Glow ring ---
            mCtx.save();
            angle = -Math.PI / 2;
            slices.forEach(({ val, color }) => {
                const a = (val / total) * Math.PI * 2;
                mCtx.shadowColor = color;
                mCtx.shadowBlur = 8;
                mCtx.strokeStyle = color;
                mCtx.lineWidth = 1;
                mCtx.beginPath();
                mCtx.arc(pieCx, pieCy, miniR, angle + GAP / 2, angle + a - GAP / 2);
                mCtx.stroke();
                angle += a;
            });
            mCtx.restore();
            // Outer ring in desire color (matches line on chart)
            mCtx.save();
            mCtx.shadowColor = da.color;
            mCtx.shadowBlur = 10;
            mCtx.strokeStyle = da.color;
            mCtx.lineWidth = 2.5;
            mCtx.beginPath();
            mCtx.arc(pieCx, pieCy, miniR + 3, 0, Math.PI * 2);
            mCtx.stroke();
            mCtx.restore();

            // --- Legend on the left of each pie ---
            const legX = secL + 8;
            const legStartY = pieCy - 22;
            mCtx.save();
            mCtx.font = '11px system-ui';
            mCtx.textAlign = 'left';
            slices.forEach((s, si) => {
                const ly = legStartY + si * 20;
                mCtx.beginPath();
                mCtx.arc(legX + 4, ly, 4, 0, Math.PI * 2);
                mCtx.fillStyle = s.color;
                mCtx.fill();
                mCtx.fillStyle = '#9ca3af';
                mCtx.fillText(s.label + ' ' + s.pct + '%', legX + 13, ly + 4);
            });
            mCtx.restore();
        });
    } else {
        miniCanvas.style.display = 'none';
    }
    MARGIN.right = savedMarginRight;
}

function drawPieAtCursor(cx, cursorY, values) {
    const active = getActiveSeries();
    const total = values.reduce((a, b) => a + b, 0);
    if (total === 0) return;

    const R = getPieRadius();
    const GAP = 0.025;                // angular gap between slices (radians)
    const HIGHLIGHT_EXTRA = R * 0.08; // extra radius for top-2 changers

    // In narrativeViewMode: show 2 slices — active (colored) + rest (gray)
    if (narrativeViewMode && activeNarrativeIdx !== null) {
        const activeVal = values[activeNarrativeIdx] || 0;
        const grayVal = total - activeVal;
        const activeColor = dataColors[activeNarrativeIdx] || active[activeNarrativeIdx].color;
        const dpr = window.devicePixelRatio || 1;
        const pw = pieCanvas.width / dpr;
        const ph = pieCanvas.height / dpr;
        const pieX = pw / 2;
        const pieY = ph / 2;
        const EX = R * 0.1;
        pieCtx.save();
        pieCtx.scale(dpr, dpr);
        pieCtx.clearRect(0, 0, pw, ph);
        // Shadow bg
        pieCtx.save();
        pieCtx.shadowColor = 'rgba(0,0,0,0.5)';
        pieCtx.shadowBlur = 20;
        pieCtx.beginPath();
        pieCtx.arc(pieX, pieY, R + HIGHLIGHT_EXTRA + 2, 0, Math.PI * 2);
        pieCtx.fillStyle = '#0f1623';
        pieCtx.fill();
        pieCtx.restore();
        const twoSlices = [
            { val: activeVal, color: activeColor, hi: true  },
            { val: grayVal,   color: '#4b5563',   hi: false },
        ];
        lastPieSlices = [];
        let sa = -Math.PI / 2;
        twoSlices.forEach(({ val, color, hi }, i) => {
            const ang = (val / total) * Math.PI * 2;
            const mid = sa + ang / 2;
            const sliceR = hi ? R + HIGHLIGHT_EXTRA : R;
            const ex = hi ? Math.cos(mid) * EX : 0;
            const ey = hi ? Math.sin(mid) * EX : 0;
            // Base fill (dimmed — same as regular pie)
            pieCtx.globalAlpha = hi ? 0.4 : 0.32;
            pieCtx.beginPath();
            pieCtx.moveTo(pieX + ex, pieY + ey);
            pieCtx.arc(pieX + ex, pieY + ey, sliceR, sa + GAP / 2, sa + ang - GAP / 2);
            pieCtx.closePath();
            pieCtx.fillStyle = color;
            pieCtx.fill();
            // 3D highlight — radial gradient for depth (same as regular pie)
            if (hi) {
                pieCtx.globalAlpha = 0.18;
                const grad = pieCtx.createRadialGradient(
                    pieX + ex + Math.cos(mid) * sliceR * 0.3,
                    pieY + ey + Math.sin(mid) * sliceR * 0.3 - sliceR * 0.15,
                    0, pieX + ex, pieY + ey, sliceR
                );
                grad.addColorStop(0, 'rgba(255,255,255,0.7)');
                grad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
                grad.addColorStop(1, 'rgba(0,0,0,0.15)');
                pieCtx.beginPath();
                pieCtx.moveTo(pieX + ex, pieY + ey);
                pieCtx.arc(pieX + ex, pieY + ey, sliceR, sa + GAP / 2, sa + ang - GAP / 2);
                pieCtx.closePath();
                pieCtx.fillStyle = grad;
                pieCtx.fill();
            }
            pieCtx.globalAlpha = 1;
            lastPieSlices.push({ startAngle: sa, endAngle: sa + ang, name: hi ? active[activeNarrativeIdx].name : 'Others', idx: hi ? activeNarrativeIdx : -1, ex, ey });
            sa += ang;
        });
        // Glow ring
        pieCtx.save();
        sa = -Math.PI / 2;
        twoSlices.forEach(({ val, color, hi }) => {
            const ang = (val / total) * Math.PI * 2;
            const mid = sa + ang / 2;
            const sliceR = hi ? R + HIGHLIGHT_EXTRA : R;
            const ex = hi ? Math.cos(mid) * EX : 0;
            const ey = hi ? Math.sin(mid) * EX : 0;
            pieCtx.shadowColor = color;
            pieCtx.shadowBlur = hi ? 14 : 4;
            pieCtx.strokeStyle = color;
            pieCtx.lineWidth = hi ? 2 : 1;
            pieCtx.beginPath();
            pieCtx.arc(pieX + ex, pieY + ey, sliceR, sa + GAP / 2, sa + ang - GAP / 2);
            pieCtx.stroke();
            sa += ang;
        });
        pieCtx.restore();
        // Labels
        sa = -Math.PI / 2;
        twoSlices.forEach(({ val, hi }) => {
            const ang = (val / total) * Math.PI * 2;
            const mid = sa + ang / 2;
            const sliceR = hi ? R + HIGHLIGHT_EXTRA : R;
            const ex = hi ? Math.cos(mid) * EX : 0;
            const ey = hi ? Math.sin(mid) * EX : 0;
            if (ang > 0.3) {
                const lx = pieX + ex + Math.cos(mid) * sliceR * 0.58;
                const ly = pieY + ey + Math.sin(mid) * sliceR * 0.58;
                pieCtx.fillStyle = '#fff';
                const fs = Math.max(11, Math.round(R * 0.16));
                pieCtx.font = 'bold ' + fs + 'px system-ui';
                pieCtx.textAlign = 'center';
                pieCtx.textBaseline = 'middle';
                pieCtx.fillText(Math.round((val / total) * 100) + '%', lx, ly);
            }
            sa += ang;
        });
        pieCtx.restore();
        updateLegendValues(values, total);
        return;
    }

    const topTwo = topTwoChangers;

    // Draw on the separate pie canvas (centered)
    const dpr = window.devicePixelRatio || 1;
    const pw = pieCanvas.width / dpr;
    const ph = pieCanvas.height / dpr;
    const pieX = pw / 2;
    const pieY = ph / 2;

    pieCtx.save();
    pieCtx.scale(dpr, dpr);
    pieCtx.clearRect(0, 0, pw, ph);

    // Shadow bg
    pieCtx.save();
    pieCtx.shadowColor = 'rgba(0,0,0,0.5)';
    pieCtx.shadowBlur = 20;
    pieCtx.beginPath();
    pieCtx.arc(pieX, pieY, R + HIGHLIGHT_EXTRA + 2, 0, Math.PI * 2);
    pieCtx.fillStyle = '#0f1623';
    pieCtx.fill();
    pieCtx.restore();

    // Slices — gaps between, top-2 get larger radius, 3D finish
    lastPieSlices = [];
    let startAngle = -Math.PI / 2;
    values.forEach((val, i) => {
        const sliceAngle = (val / total) * Math.PI * 2;
        const highlighted = topTwo.has(i);
        const sliceR = highlighted ? R + HIGHLIGHT_EXTRA : R;
        const a0 = startAngle + GAP / 2;
        const a1 = startAngle + sliceAngle - GAP / 2;
        const midAngle = startAngle + sliceAngle / 2;
        const col = dataColors[i] || active[i].color;

        // Base fill (dimmed)
        pieCtx.globalAlpha = 0.4;
        pieCtx.beginPath();
        pieCtx.moveTo(pieX, pieY);
        pieCtx.arc(pieX, pieY, sliceR, a0, a1);
        pieCtx.closePath();
        pieCtx.fillStyle = col;
        pieCtx.fill();

        // 3D highlight — radial gradient for depth
        pieCtx.globalAlpha = 0.18;
        const grad = pieCtx.createRadialGradient(
            pieX + Math.cos(midAngle) * sliceR * 0.3,
            pieY + Math.sin(midAngle) * sliceR * 0.3 - sliceR * 0.15,
            0, pieX, pieY, sliceR
        );
        grad.addColorStop(0, 'rgba(255,255,255,0.7)');
        grad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
        grad.addColorStop(1, 'rgba(0,0,0,0.15)');
        pieCtx.beginPath();
        pieCtx.moveTo(pieX, pieY);
        pieCtx.arc(pieX, pieY, sliceR, a0, a1);
        pieCtx.closePath();
        pieCtx.fillStyle = grad;
        pieCtx.fill();
        pieCtx.globalAlpha = 1;

        lastPieSlices.push({ startAngle, endAngle: startAngle + sliceAngle, name: active[i].name, idx: i, r: sliceR });
        startAngle += sliceAngle;
    });
    pieCtx.globalAlpha = 1;

    // Percentage labels inside slices
    startAngle = -Math.PI / 2;
    values.forEach((val, i) => {
        const sliceAngle = (val / total) * Math.PI * 2;
        const midAngle = startAngle + sliceAngle / 2;
        const highlighted = topTwo.has(i);
        const sliceR = highlighted ? R + HIGHLIGHT_EXTRA : R;
        if (sliceAngle > 0.3) {
            const lx = pieX + Math.cos(midAngle) * sliceR * 0.58;
            const ly = pieY + Math.sin(midAngle) * sliceR * 0.58;
            pieCtx.fillStyle = '#fff';
            const fontSize = Math.max(11, Math.round(R * 0.16));
            pieCtx.textAlign = 'center';
            // Extract leading emoji from category name
            const emojiMatch = active[i].name.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F?)/u);
            const emoji = emojiMatch ? emojiMatch[0] : '';
            if (emoji) {
                if (emoji !== '🎵') pieCtx.globalAlpha = 0.5;
                pieCtx.font = (fontSize - 2) + 'px system-ui';
                pieCtx.textBaseline = 'middle';
                pieCtx.fillText(emoji, lx, ly - fontSize * 0.7);
                pieCtx.globalAlpha = 1;
            }
            pieCtx.font = 'bold ' + fontSize + 'px system-ui';
            pieCtx.textBaseline = 'middle';
            pieCtx.fillText(Math.round((val / total) * 100) + '%', lx, ly + (emoji ? fontSize * 0.4 : 0));
        }
        startAngle += sliceAngle;
    });

    pieCtx.restore();

    // Update legend with hover percentages
    updateLegendValues(values, total);

    // Vertical line on main chart canvas (only when hovering)
    if (cx >= 0) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx, MARGIN.top + chartH());
        ctx.lineTo(cx, MARGIN.top);
        ctx.stroke();
        ctx.restore();
    }
}

function drawBarChart(floatIdx, values) {
    const barCanvas = document.getElementById('barCanvas');
    if (!barCanvas || !activeDesire) return;

    const dpr = window.devicePixelRatio || 1;
    const bCtx = barCanvas.getContext('2d');
    const bw = barCanvas.width / dpr;
    const bh = barCanvas.height / dpr;

    bCtx.save();
    bCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    bCtx.clearRect(0, 0, bw, bh);

    const narrs = activeDesire.narratives;
    const count = narrs.length;
    const narrValues = values.slice(0, count);
    const maxVal = Math.max(...narrValues, 1);

    const padTop = 30, padBot = 50;
    const barAreaH = bh - padTop - padBot;
    const gap = 14;
    const barW = (bw - gap * (count + 1)) / count;
    const startX = gap;

    narrValues.forEach((val, i) => {
        const barH = Math.max(2, (val / maxVal) * barAreaH);
        const x = startX + i * (barW + gap);
        const y = padTop + barAreaH - barH;

        // Bar gradient
        const color = dataColors[i] || '#3b82f6';
        const grad = bCtx.createLinearGradient(x, y, x, y + barH);
        grad.addColorStop(0, color);
        grad.addColorStop(1, color + '99');
        bCtx.fillStyle = grad;
        bCtx.globalAlpha = 0.88;
        bCtx.beginPath();
        bCtx.roundRect(x, y, barW, barH, [5, 5, 0, 0]);
        bCtx.fill();
        bCtx.globalAlpha = 1.0;

        // Glow at top
        bCtx.shadowColor = color;
        bCtx.shadowBlur = 8;
        bCtx.fillStyle = color;
        bCtx.fillRect(x + 2, y, barW - 4, 2);
        bCtx.shadowBlur = 0;

        // Value label above bar
        const kVal = Math.round(val * DESIRE_EXPOSURE_SCALE);
        bCtx.fillStyle = '#e2e8f0';
        bCtx.font = 'bold 12px system-ui';
        bCtx.textAlign = 'center';
        bCtx.fillText(kVal + 'K', x + barW / 2, y - 8);

        // Narrative label below bar (wrap 2 lines)
        bCtx.fillStyle = '#94a3b8';
        bCtx.font = '9px system-ui';
        const words = narrs[i].name.split(' ');
        let line1 = '', line2 = '';
        for (const w of words) {
            if (!line1 || bCtx.measureText(line1 + ' ' + w).width < barW + 4) {
                line1 += (line1 ? ' ' : '') + w;
            } else if (!line2 || bCtx.measureText(line2 + ' ' + w).width < barW + 4) {
                line2 += (line2 ? ' ' : '') + w;
            }
        }
        bCtx.fillText(line1, x + barW / 2, bh - padBot + 14);
        if (line2) bCtx.fillText(line2, x + barW / 2, bh - padBot + 25);
    });

    bCtx.restore();
}

function drawDesirePie(cx, cy, opinionAtPoint) {
    const { agrees, unsure, disagrees } = opinionAtPoint;
    const total = agrees + unsure + disagrees;
    if (total === 0) return;
    const r = getPieRadius();


    const dpr = window.devicePixelRatio || 1;
    const pw = pieCanvas.width / dpr;
    const ph = pieCanvas.height / dpr;
    const pieX = pw / 2;
    const pieY = ph / 2;

    pieCtx.save();
    pieCtx.scale(dpr, dpr);
    pieCtx.clearRect(0, 0, pw, ph);

    const slices = [
        { val: agrees,    color: '#3b82f6', label: 'Agrees' },
        { val: unsure,    color: '#1e293b', label: 'Undecided' },
        { val: disagrees, color: '#ec4899', label: 'Disagrees' },
    ];

    // (legend moved inside slices — see label rendering below)

    pieCtx.save();
    pieCtx.shadowColor = 'rgba(0,0,0,0.5)';
    pieCtx.shadowBlur = 20;
    pieCtx.beginPath();
    pieCtx.arc(pieX, pieY, r + 4, 0, Math.PI * 2);
    pieCtx.fillStyle = '#0f1623';
    pieCtx.fill();
    pieCtx.restore();
    const GAP = 0.025;
    let angle = -Math.PI / 2;
    slices.forEach(({ val, color }) => {
        const a = (val / total) * Math.PI * 2;
        const mid = angle + a / 2;
        // Base fill (dimmed)
        pieCtx.globalAlpha = 0.4;
        pieCtx.beginPath();
        pieCtx.moveTo(pieX, pieY);
        pieCtx.arc(pieX, pieY, r, angle + GAP / 2, angle + a - GAP / 2);
        pieCtx.closePath();
        pieCtx.fillStyle = color;
        pieCtx.fill();
        // 3D highlight
        pieCtx.globalAlpha = 0.18;
        const grad = pieCtx.createRadialGradient(
            pieX + Math.cos(mid) * r * 0.3,
            pieY + Math.sin(mid) * r * 0.3 - r * 0.15,
            0, pieX, pieY, r
        );
        grad.addColorStop(0, 'rgba(255,255,255,0.7)');
        grad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
        grad.addColorStop(1, 'rgba(0,0,0,0.15)');
        pieCtx.beginPath();
        pieCtx.moveTo(pieX, pieY);
        pieCtx.arc(pieX, pieY, r, angle + GAP / 2, angle + a - GAP / 2);
        pieCtx.closePath();
        pieCtx.fillStyle = grad;
        pieCtx.fill();
        pieCtx.globalAlpha = 1;
        angle += a;
    });

    // Glow ring per slice (same as main pie)
    pieCtx.save();
    angle = -Math.PI / 2;
    slices.forEach(({ val, color }) => {
        const a = (val / total) * Math.PI * 2;
        pieCtx.shadowColor = color;
        pieCtx.shadowBlur = 8;
        pieCtx.strokeStyle = color;
        pieCtx.lineWidth = 1;
        pieCtx.beginPath();
        pieCtx.arc(pieX, pieY, r, angle + GAP / 2, angle + a - GAP / 2);
        pieCtx.stroke();
        angle += a;
    });
    pieCtx.restore();

    // Percentage labels inside slices
    pieCtx.save();
    angle = -Math.PI / 2;
    const labelR = r * 0.55;
    const lblFs = Math.max(10, Math.round(r * 0.13));
    pieCtx.textAlign = 'center';
    const nameFs = Math.max(8, lblFs - 2);
    const pctFs = lblFs;
    slices.forEach(({ val, color, label }) => {
        const a = (val / total) * Math.PI * 2;
        const mid = angle + a / 2;
        const pct = Math.round(val / total * 100);
        if (pct >= 5) {
            const lx = pieX + Math.cos(mid) * labelR;
            const ly = pieY + Math.sin(mid) * labelR;
            pieCtx.shadowColor = 'rgba(0,0,0,0.8)';
            pieCtx.shadowBlur = 4;
            pieCtx.fillStyle = '#f9fafb';
            // Category name
            pieCtx.font = 'bold ' + nameFs + 'px system-ui';
            pieCtx.textBaseline = 'bottom';
            pieCtx.fillText(label, lx, ly - 1);
            // Percentage
            pieCtx.font = 'bold ' + pctFs + 'px system-ui';
            pieCtx.textBaseline = 'top';
            pieCtx.fillText(pct + '%', lx, ly + 1);
        }
        angle += a;
    });
    pieCtx.restore();

    pieCtx.restore();

    // Vertical line on main chart canvas (only when hovering)
    if (cx >= 0) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx, MARGIN.top + chartH());
        ctx.lineTo(cx, MARGIN.top);
        ctx.stroke();
        ctx.restore();
    }
}

function drawTimeAxis(ctx) {
    const range = curRange;
    const now = new Date();
    const startDate = new Date(now);
    startDate.setDate(now.getDate() - range.days);
    const nowYear = now.getFullYear();

    ctx.fillStyle = '#4b5563';
    ctx.textAlign = 'center';
    ctx.font = '13px system-ui';
    const labelY = MARGIN.top + chartH() + 25;

    // Convert a Date to x position (left edge → TODAY line)
    const todayX = xForIndex(TODAY_IDX);
    const timelineW = todayX - MARGIN.left;
    function dateToX(d) {
        const daysAgo = (now - d) / 86400000;
        const frac = 1 - daysAgo / range.days;
        return MARGIN.left + frac * timelineW;
    }

    // Format: relative English labels
    function fmt(d) {
        const daysAgo = Math.round((now - d) / 86400000);
        if (daysAgo <= 0) return 'Today';
        if (daysAgo === 1) return 'Yesterday';
        if (daysAgo <= 6) return daysAgo + ' days ago';
        if (daysAgo <= 13) return '1 week ago';
        if (daysAgo <= 20) return '2 weeks ago';
        if (daysAgo <= 29) return '3 weeks ago';
        const months = Math.round(daysAgo / 30);
        if (months <= 1) return '1 month ago';
        if (months <= 11) return months + ' months ago';
        const years = Math.round(daysAgo / 365);
        if (years <= 1) return '1 year ago';
        return years + ' years ago';
    }

    if (range.days <= 1) {
        // 24H: show hours HH:00
        const hoursStep = 3;
        const tickXs = [];
        for (let h = 0; h <= 24; h += hoursStep) {
            const d = new Date(now.getTime() - h * 3600000);
            const x = dateToX(d);
            if (x >= MARGIN.left && x <= todayX) {
                ctx.fillText(d.getHours().toString().padStart(2, '0') + ':00', x, labelY);
                tickXs.push(x);
            }
        }
        return tickXs;
    }

    // Place labels at chart indices 1, 3, 5, 7
    const tickXs = [];
    [1, 3, 5, 7].forEach(idx => {
        const x = xForIndex(idx);
        const daysAgo = range.days * (TODAY_IDX - idx) / TODAY_IDX;
        const d = new Date(now.getTime() - daysAgo * 86400000);
        ctx.fillText(fmt(d), x, labelY);
        tickXs.push(x);
    });
    return tickXs;
}

canvas.addEventListener('mousemove', (e) => {

// ==================== PIE TOOLTIP + CLICK ====================
const pieTooltip = document.getElementById('pieTooltip');
function hitTestPie(e) {
    const rect = pieCanvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const pw = pieCanvas.width / dpr;
    const ph = pieCanvas.height / dpr;
    const pieX = pw / 2, pieY = ph / 2;
    const mx = (e.clientX - rect.left) * (pw / rect.width);
    const my = (e.clientY - rect.top) * (ph / rect.height);
    const dx = mx - pieX, dy = my - pieY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (lastPieSlices.length === 0) return null;
    let angle = Math.atan2(dy, dx);
    if (angle < -Math.PI / 2) angle += Math.PI * 2;
    for (const s of lastPieSlices) {
        if (angle >= s.startAngle && angle < s.endAngle && dist <= s.r) return s;
    }
    return null;
}
pieCanvas.addEventListener('mousemove', (e) => {
    const hit = hitTestPie(e);
    if (hit) {
        pieTooltip.textContent = hit.name;
        pieTooltip.style.display = 'block';
        pieTooltip.style.left = (e.clientX + 12) + 'px';
        pieTooltip.style.top = (e.clientY - 8) + 'px';
        pieCanvas.style.cursor = 'pointer';
    } else {
        pieTooltip.style.display = 'none';
        pieCanvas.style.cursor = 'default';
    }
});
pieCanvas.addEventListener('mouseleave', () => {
    pieTooltip.style.display = 'none';
    pieCanvas.style.cursor = 'default';
});
pieCanvas.addEventListener('click', (e) => {
    const hit = hitTestPie(e);
    if (hit != null && hit.idx >= 0) {
        pieTooltip.style.display = 'none';
        const s = getActiveSeries()[hit.idx];
        if (s && s.children) drillDown(hit.idx);
        else if (s && s.insights) enterNarrativeView(hit.idx);
    }
});

// ==================== DESIRE VIEW ====================
function enterDesireView(desire) {
    // Save narrative view state so we can restore on exit
    desirePrevNarrMode = narrativeViewMode;
    desirePrevNarrIdx = activeNarrativeIdx;
    desirePrevNarrOwnerPath = narrativeViewOwnerPath ? narrativeViewOwnerPath.slice() : [];
    narrativeViewMode = false;
    activeNarrativeIdx = null;

    desireViewMode = true;
    activeDesire = desire;
    desireViewOwnerPath = drilldownPath.slice();

    // Widen left panel so narrative names don't wrap
    const lc = document.getElementById('leftCol');
    if (lc && lc.offsetWidth < 400) lc.style.width = '400px';

    generateData(); buildLegend(); draw();
}

function exitDesireView() {
    offlineMode = false;
    desireViewMode = false;
    activeDesire = null;
    deepAnalysisMode = false;
    deepRevealProgress = -1;
    drilldownPath = desireViewOwnerPath.slice();
    // Restore narrative view state
    narrativeViewMode = desirePrevNarrMode;
    activeNarrativeIdx = desirePrevNarrIdx;
    narrativeViewOwnerPath = desirePrevNarrOwnerPath;

    // Restore default left panel width
    const lc = document.getElementById('leftCol');
    if (lc) lc.style.width = '300px';

    generateData(); buildLegend(); draw();
}

function enterNarrativeView(idx) {
    narrativeViewMode = true;
    activeNarrativeIdx = idx;
    narrativeViewOwnerPath = drilldownPath.slice();
    generateData(); buildLegend(); draw();
}

function exitNarrativeView() {
